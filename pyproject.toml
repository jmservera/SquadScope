# Python tooling configuration for SquadScope.
#
# Ruff is introduced in warning-only (Phase A) mode — see issue #540 and the
# DevSecOps Guardrails epic (jmservera/SquadScope-Coordinator#33). The CI job is
# non-blocking for now; violations are reported as annotations only and are not
# fixed yet (Phase B) nor enforced (Phase C).

[tool.ruff]
line-length = 100
target-version = "py312"

# Keep generated, vendored and archived code out of the baseline.
extend-exclude = [
    ".venv",
    "venv",
    "node_modules",
    "public",
    "resources",
    "themes",
    "scripts/archived",
    ".worktrees",
]

[tool.ruff.lint]
# Conservative Phase-A rule subset: pycodestyle errors (E), Pyflakes (F),
# and import sorting (I). Broaden in later phases.
select = ["E", "F", "I"]

# Line length is owned by the formatter (`ruff format`), enforced in CI via
# `ruff format --check`. E501 only fires on content the formatter intentionally
# leaves untouched — long URLs and prose inside triple-quoted string templates
# and test fixtures, which cannot be wrapped without changing program output.
# Following the standard Black/Ruff convention, we disable the lint-side E501
# check while keeping formatter-enforced wrapping for code.
ignore = ["E501"]
