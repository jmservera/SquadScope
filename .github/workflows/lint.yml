# Ruff lint — Phase C (blocking / enforced)
#
# DevSecOps Guardrails epic (jmservera/SquadScope-Coordinator#33), issues #540
# (baseline), #543 (Phase B fixes), #545 (Phase C enforcement). The Phase B
# baseline is clean, so this job is now BLOCKING: it fails the build on any new
# lint violation or unformatted code. Mark "Lint / Ruff" as a required check.

name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Ruff (pinned)
        run: python -m pip install ruff==0.15.7

      - name: Ruff check (GitHub annotations)
        # Phase C: blocking. Fails the build on any lint violation.
        run: ruff check . --output-format=github

      - name: Ruff format check
        # Line length is owned by the formatter; enforce it here (blocking).
        run: ruff format --check .

      - name: Ruff statistics (summary)
        if: always()
        run: |
          {
            echo "### Ruff statistics"
            echo ""
            echo '```'
            ruff check . --statistics || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
