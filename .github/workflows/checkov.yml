# Checkov lint — Phase C (blocking / enforced)
#
# DevSecOps Guardrails epic (jmservera/SquadScope-Coordinator#33), issues #541
# (baseline), #543 (Phase B fixes), #545 (Phase C enforcement). The Phase B
# baseline is clean (0 failed; 4 justified inline skips), so this job is now
# BLOCKING: it fails the build on any new IaC/container/Actions misconfiguration.
# Accepted findings must carry a justified inline `# checkov:skip=<id>:<reason>`.
# Mark "Checkov / Checkov IaC/container scan" as a required check.

name: Checkov

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checkov:
    name: Checkov IaC/container scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Checkov (pinned)
        run: python -m pip install checkov==3.2.533

      - name: Run Checkov (blocking, SARIF)
        # Phase C: blocking. No --soft-fail — a failed check fails the build.
        # Accepted findings must use a justified inline `# checkov:skip`.
        run: |
          checkov \
            --directory . \
            --framework github_actions dockerfile secrets \
            --skip-path node_modules \
            --skip-path .venv \
            --skip-path public \
            --skip-path resources \
            --skip-path themes \
            --compact \
            --output cli \
            --output sarif \
            --output-file-path console,checkov-results.sarif

      - name: Checkov summary
        if: always()
        run: |
          {
            echo "### Checkov scan"
            echo ""
            echo "See the job log for the full report. This check is blocking (Phase C):"
            echo "new misconfigurations fail the build; accepted findings carry a"
            echo "justified inline \`# checkov:skip=<id>:<reason>\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          sarif_file: checkov-results.sarif
          category: checkov

      - name: Upload SARIF as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: checkov-sarif
          path: checkov-results.sarif
          retention-days: 30
