name: Deploy Hugo site

on: # zizmor: ignore[dangerous-triggers] intentional post-crawl auto-deploy; build job is guarded by conclusion==success and actor checks
  push:
    branches:
      - main
  # Auto-deploy after a successful crawl-and-publish run so the site always
  # reflects the latest content committed to the publish branch.
  workflow_run:
    workflows: ["Crawl and publish weekly data"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    # Allow manual triggers, human pushes to main, and post-crawl auto-runs.
    # Bot pushes are excluded from push events to avoid loops; workflow_run
    # covers the bot-written publish branch updates.
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.actor != 'github-actions[bot]') || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
    env:
      HUGO_VERSION: 0.161.1
      HUGO_PARAMS_GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Install Hugo
        run: | # zizmor: ignore[github-env] writes a fixed runner path (${HOME}/.local/hugo) to GITHUB_PATH, not attacker input; needed so later steps can run hugo
          set -euo pipefail
          RELEASE_URL="https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}"
          TARBALL="hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          CHECKSUM_FILE="hugo_${HUGO_VERSION}_checksums.txt"
          curl --fail --silent --show-error --location --retry 10 --retry-delay 5 --retry-max-time 300 --retry-all-errors \
            --output "${TARBALL}" "${RELEASE_URL}/${TARBALL}"
          
          # Download and verify checksums
          curl --fail --silent --show-error --location --retry 10 --retry-delay 5 --retry-max-time 300 --retry-all-errors \
            --output "${CHECKSUM_FILE}" "${RELEASE_URL}/${CHECKSUM_FILE}"
          checksum_line="$(awk -v file="${TARBALL}" '$NF == file {print; found=1} END {if (!found) exit 1}' "${CHECKSUM_FILE}")" || {
            echo "Error: No checksum entry for ${TARBALL} found in ${CHECKSUM_FILE}" >&2
            exit 1
          }
          if ! printf '%s\n' "${checksum_line}" | sha256sum --check; then
            echo "Error: Checksum verification failed for ${TARBALL}" >&2
            exit 1
          fi
          rm "${CHECKSUM_FILE}"
          
          mkdir -p "${HOME}/.local/hugo"
          tar -C "${HOME}/.local/hugo" -xf "${TARBALL}"
          rm "${TARBALL}"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"
          export PATH="${HOME}/.local/hugo:${PATH}"
          hugo version

      - name: Hydrate generated content from publish
        # Architecture: code/theme/config come from main; all generated content
        # (weekly pages, rollups, raw data) comes from the canonical publish branch.
        # This prevents the site from ever diverging from the crawl-and-publish output.
        run: |
          set -euo pipefail
          git fetch origin publish
          # Wipe and re-checkout to mirror publish exactly (deletions propagate)
          rm -rf content/weekly content/monthly content/yearly data/analyzed data/raw data/metrics data/snapshots
          git checkout origin/publish -- \
            content/weekly/ \
            content/monthly/ \
            content/yearly/ \
            data/analyzed/ \
            data/raw/ \
            data/metrics/ \
            data/snapshots/ || true
          echo "Hydrated from publish:"
          ls content/weekly/2026/ 2>/dev/null || true

      - name: Build site
        run: hugo --minify

      - name: Build Pagefind index
        run: npx pagefind --site public/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

  notify-failure:
    needs: [build, deploy]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create or update failure issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
        run: |
          RUN_URL="${SERVER_URL}/${GH_REPO}/actions/runs/${RUN_ID}"
          EXISTING=$(gh issue list --label 'deploy-failure' --state open --json number --jq length)
          if [ "$EXISTING" -gt 0 ]; then
            ISSUE_NUM=$(gh issue list --label 'deploy-failure' --state open --json number --jq '.[0].number')
            gh issue comment "$ISSUE_NUM" --body "Deploy failed again: ${RUN_URL}"
            echo "Updated existing issue #$ISSUE_NUM"
          else
            BODY=$(printf '%s\n\n%s\n\n%s\n%s\n%s' \
              "The Deploy Hugo site workflow failed." \
              "**Run:** ${RUN_URL}" \
              "Please triage:" \
              "- If transient (rate limit, network), close with comment" \
              "- If real bug, assign to the right squad member")
            gh issue create \
              --title "🔴 Deploy Hugo site failed (run ${RUN_ID})" \
              --label 'squad,deploy-failure' \
              --body "$BODY"
          fi
