name: Deploy Hugo site

on:
  push:
    branches:
      - main
  # Auto-deploy after a successful crawl-and-publish run so the site always
  # reflects the latest content committed to the publish branch.
  workflow_run:
    workflows: ["Crawl and publish weekly data"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    # Allow manual triggers, human pushes to main, and post-crawl auto-runs.
    # Bot pushes are excluded from push events to avoid loops; workflow_run
    # covers the bot-written publish branch updates.
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.actor != 'github-actions[bot]') || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.161.1
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Hugo
        run: |
          TARBALL="hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          curl -sLJO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/${TARBALL}"
          
          # Download and verify checksums
          curl -sLJO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_${HUGO_VERSION}_checksums.txt"
          sha256sum --check hugo_${HUGO_VERSION}_checksums.txt --ignore-missing || exit 1
          rm "hugo_${HUGO_VERSION}_checksums.txt"
          
          mkdir -p "${HOME}/.local/hugo"
          tar -C "${HOME}/.local/hugo" -xf "${TARBALL}"
          rm "${TARBALL}"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"
          export PATH="${HOME}/.local/hugo:${PATH}"
          hugo version

      - name: Hydrate generated content from publish
        # Architecture: code/theme/config come from main; all generated content
        # (weekly pages, rollups, raw data) comes from the canonical publish branch.
        # This prevents the site from ever diverging from the crawl-and-publish output.
        run: |
          set -euo pipefail
          git fetch origin publish
          # Wipe and re-checkout to mirror publish exactly (deletions propagate)
          rm -rf content/weekly content/monthly content/yearly data/analyzed data/raw data/metrics data/snapshots
          git checkout origin/publish -- \
            content/weekly/ \
            content/monthly/ \
            content/yearly/ \
            data/analyzed/ \
            data/raw/ \
            data/metrics/ \
            data/snapshots/ || true
          echo "Hydrated from publish:"
          ls content/weekly/2026/ 2>/dev/null || true

      - name: Build site
        run: hugo --minify

      - name: Build Pagefind index
        run: npx pagefind --site public/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify-failure:
    needs: [build, deploy]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create or update failure issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          EXISTING=$(gh issue list --label 'deploy-failure' --state open --json number --jq length)
          if [ "$EXISTING" -gt 0 ]; then
            ISSUE_NUM=$(gh issue list --label 'deploy-failure' --state open --json number --jq '.[0].number')
            gh issue comment "$ISSUE_NUM" --body "Deploy failed again: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "Updated existing issue #$ISSUE_NUM"
          else
            BODY=$(printf '%s\n\n%s\n\n%s\n%s\n%s' \
              "The Deploy Hugo site workflow failed." \
              "**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              "Please triage:" \
              "- If transient (rate limit, network), close with comment" \
              "- If real bug, assign to the right squad member")
            gh issue create \
              --title "🔴 Deploy Hugo site failed (run ${{ github.run_id }})" \
              --label 'squad,deploy-failure' \
              --body "$BODY"
          fi
