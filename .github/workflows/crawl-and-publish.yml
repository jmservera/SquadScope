name: Crawl and publish weekly data

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: write

concurrency:
  group: weekly-crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Find latest successful crawl cache
        id: previous-cache-run
        uses: actions/github-script@v7
        with:
          script: |
            const workflowId = 'crawl-and-publish.yml';
            const branch = context.payload.repository.default_branch;
            const currentRunId = String(context.runId);
            const perPage = 100;
            let page = 1;
            let previous = null;

            try {
              while (!previous) {
                const { data } = await github.rest.actions.listWorkflowRuns({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: workflowId,
                  branch,
                  status: 'completed',
                  per_page: perPage,
                  page,
                });

                previous = data.workflow_runs.find((run) => run.conclusion === 'success' && String(run.id) !== currentRunId) ?? null;
                if (previous || data.workflow_runs.length < perPage) {
                  break;
                }

                page += 1;
              }

              core.setOutput('run_id', previous ? String(previous.id) : '');
              core.info(previous ? `Restoring crawl cache from run ${previous.id}.` : 'No previous successful crawl cache found.');
            } catch (error) {
              core.warning(`Skipping cache restore lookup: ${error.message}`);
              core.setOutput('run_id', '');
            }

      - name: Restore previous crawl cache
        if: steps.previous-cache-run.outputs.run_id != ''
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.previous-cache-run.outputs.run_id }}
          name: crawl-cache
          path: data/cache/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run crawler
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/crawl.py

      - name: Upload raw crawl artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raw-data
          path: data/raw/
          if-no-files-found: warn

      - name: Upload snapshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawl-snapshots
          path: data/snapshots/
          if-no-files-found: warn

      - name: Upload cache artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawl-cache
          path: data/cache/
          if-no-files-found: warn

      - name: Commit crawl data
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git status --short -- data/raw data/snapshots | grep -q .; then
            echo "No crawl data changes to commit."
            exit 0
          fi
          git stash push --include-untracked --message crawl-data -- data/raw data/snapshots
          git fetch origin "$DEFAULT_BRANCH"
          git checkout -B "$DEFAULT_BRANCH" "origin/$DEFAULT_BRANCH"
          git stash pop || {
            echo "Failed to reapply crawl data after syncing $DEFAULT_BRANCH."
            exit 1
          }
          git add data/raw/ data/snapshots/
          git commit -m "data: weekly crawl $(date +%Y-W%V)"
          git push origin "HEAD:$DEFAULT_BRANCH" || {
            echo "Push failed after syncing with $DEFAULT_BRANCH."
            exit 1
          }

  analyze:
    needs: crawl
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      copilot-requests: write
      models: read
    outputs:
      week: ${{ steps.analysis-context.outputs.week }}
      summary_file: ${{ steps.analysis-context.outputs.output_file }}
      current_datetime: ${{ steps.analysis-context.outputs.current_datetime }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Download raw crawl artifact
        uses: actions/download-artifact@v4
        with:
          name: raw-data
          path: data/raw/

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Prepare analysis context
        id: analysis-context
        run: |
          mkdir -p data/analyzed
          CURRENT_DATETIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          readarray -t CONTEXT_LINES < <(python3 - <<'PY' "$CURRENT_DATETIME"
          import json
          import sys
          from datetime import UTC, datetime
          from pathlib import Path

          current_datetime = sys.argv[1]
          run_datetime = datetime.fromisoformat(current_datetime.replace("Z", "+00:00")).astimezone(UTC)
          iso_year, iso_week, _ = run_datetime.isocalendar()
          week = f"{iso_year}-W{iso_week:02d}"
          week_file = Path("data/raw") / f"{week}.json"
          if not week_file.exists():
              raise SystemExit(f"Missing raw payload for current run: {week_file}")
          payload = json.loads(week_file.read_text(encoding="utf-8"))
          if payload.get("week") != week:
              raise SystemExit(f"Raw payload week mismatch: expected {week}, found {payload.get('week')!r}")
          print(f"week_file={week_file.as_posix()}")
          print(f"week={week}")
          print(f"output_file=data/analyzed/{week}-summary.md")
          PY
          )
          {
            printf '%s\n' "${CONTEXT_LINES[@]}"
            echo "current_datetime=$CURRENT_DATETIME"
          } >> "$GITHUB_OUTPUT"

      - name: Install Copilot CLI
        id: install-copilot
        continue-on-error: true
        run: npm install -g @github/copilot

      - name: Run analysis
        id: run-analysis
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          OUTPUT_FILE="${{ steps.analysis-context.outputs.output_file }}"
          WEEK_FILE="${{ steps.analysis-context.outputs.week_file }}"
          CURRENT_DATETIME="${{ steps.analysis-context.outputs.current_datetime }}"

          if command -v copilot >/dev/null 2>&1 && copilot -p "$(python3 scripts/analyze_fallback.py --raw-json "$WEEK_FILE" --output "$OUTPUT_FILE" --current-datetime "$CURRENT_DATETIME" --print-prompt)" \
            -s \
            --no-ask-user \
            --model claude-sonnet-4 \
            --allow-tool=read \
            --allow-tool=write \
            --allow-tool=glob \
            --allow-tool=grep \
            > "$OUTPUT_FILE"; then
            echo "analysis_source=copilot-cli" >> "$GITHUB_OUTPUT"
          else
            echo "Copilot CLI unavailable or failed; falling back to GitHub Models API."
            python3 scripts/analyze_fallback.py \
              --raw-json "$WEEK_FILE" \
              --output "$OUTPUT_FILE" \
              --current-datetime "$CURRENT_DATETIME"
            echo "analysis_source=github-models" >> "$GITHUB_OUTPUT"
          fi

      - name: quality-check
        env:
          ANALYSIS_FILE: ${{ steps.analysis-context.outputs.output_file }}
          ANALYSIS_SOURCE: ${{ steps.run-analysis.outputs.analysis_source }}
          RAW_JSON_FILE: ${{ steps.analysis-context.outputs.week_file }}
          CURRENT_DATETIME: ${{ steps.analysis-context.outputs.current_datetime }}
        run: |
          python3 scripts/analysis_gate.py \
            --analysis-file "$ANALYSIS_FILE" \
            --raw-json "$RAW_JSON_FILE" \
            --current-datetime "$CURRENT_DATETIME" \
            --source "$ANALYSIS_SOURCE"

      - name: Commit analysis
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          WEEK: ${{ steps.analysis-context.outputs.week }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git status --short -- data/analyzed | grep -q .; then
            echo "No analyzed data changes to commit."
            exit 0
          fi
          git stash push --include-untracked --message analyzed-data -- data/analyzed
          git fetch origin "$DEFAULT_BRANCH"
          git checkout -B "$DEFAULT_BRANCH" "origin/$DEFAULT_BRANCH"
          git stash pop || {
            echo "Failed to reapply analyzed data after syncing $DEFAULT_BRANCH."
            exit 1
          }
          git add data/analyzed/
          git diff --cached --quiet || git commit -m "analysis: weekly summary $WEEK"
          git push origin "HEAD:$DEFAULT_BRANCH" || {
            echo "Push failed after syncing with $DEFAULT_BRANCH."
            exit 1
          }

      - name: Upload analyzed data
        uses: actions/upload-artifact@v4
        with:
          name: analyzed-data
          path: data/analyzed/
          if-no-files-found: warn

  generate:
    needs: analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    outputs:
      page_path: ${{ steps.generate-content.outputs.page_path }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Download analyzed data artifact
        uses: actions/download-artifact@v4
        with:
          name: analyzed-data
          path: data/analyzed/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate weekly content
        id: generate-content
        env:
          SUMMARY_FILE: ${{ needs.analyze.outputs.summary_file }}
        run: |
          set -euo pipefail
          python3 - <<'PY2' "$SUMMARY_FILE" >> "$GITHUB_OUTPUT"
          import sys
          from pathlib import Path

          import scripts.generate_content as generate_content

          summary_path = Path(sys.argv[1])
          page_path = generate_content.generate_content(summary_path)
          print(f"page_path={page_path.as_posix()}")
          PY2

      - name: Commit generated content
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          WEEK: ${{ needs.analyze.outputs.week }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git status --short -- content/weekly | grep -q .; then
            echo "No generated content changes to commit."
            exit 0
          fi
          git stash push --include-untracked --message generated-content -- content/weekly
          git fetch origin "$DEFAULT_BRANCH"
          git checkout -B "$DEFAULT_BRANCH" "origin/$DEFAULT_BRANCH"
          git stash pop || {
            echo "Failed to reapply generated content after syncing $DEFAULT_BRANCH."
            exit 1
          }
          git add content/weekly/
          git diff --cached --quiet || git commit -m "content: weekly page $WEEK"
          git push origin "HEAD:$DEFAULT_BRANCH" || {
            echo "Push failed after syncing with $DEFAULT_BRANCH."
            exit 1
          }

      - name: Upload generated content artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-content
          path: content/weekly/
          if-no-files-found: warn

  deploy:
    needs: generate
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      HUGO_VERSION: 0.161.1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Download raw crawl artifact
        uses: actions/download-artifact@v4
        with:
          name: raw-data
          path: data/raw/

      - name: Download analyzed data artifact
        uses: actions/download-artifact@v4
        with:
          name: analyzed-data
          path: data/analyzed/

      - name: Download generated content artifact
        uses: actions/download-artifact@v4
        with:
          name: generated-content
          path: content/weekly/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install Hugo
        run: |
          set -euo pipefail
          TARBALL="hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          curl -sLJO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/${TARBALL}"
          curl -sLJO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_${HUGO_VERSION}_checksums.txt"
          sha256sum --check "hugo_${HUGO_VERSION}_checksums.txt" --ignore-missing
          rm "hugo_${HUGO_VERSION}_checksums.txt"
          mkdir -p "${HOME}/.local/hugo"
          tar -C "${HOME}/.local/hugo" -xf "${TARBALL}"
          rm "${TARBALL}"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"
          export PATH="${HOME}/.local/hugo:${PATH}"
          hugo version

      - name: Build site
        run: hugo --minify

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    needs: [generate, deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: analyzed-data
          path: data/analyzed/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUMMARY_FILE: ${{ needs.analyze.outputs.summary_file }}
        run: |
          WEEK=$(basename "$SUMMARY_FILE" | sed 's/-summary.md//')

          gh release create "week-${WEEK}" \
            --title "Week ${WEEK} — Tech Trends Summary" \
            --notes-file "$SUMMARY_FILE" \
            --latest
