name: Crawl and publish weekly data

on:
  schedule:
    # Mondays at 06:53 UTC (GitHub can delay scheduled workflows during peak load)
    - cron: '53 11 * * 0'
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Rerun mode: normal is guarded/non-destructive; dry-run/candidate-only never publish; restore requires rebuild_week; force-replace is explicit replacement.'
        required: false
        default: normal
        type: choice
        options:
          - normal
          - dry-run
          - restore
          - force-replace
          - candidate-only
      source_refresh_policy:
        description: 'Source refresh policy for reruns. Default reuses eligible same-day source artifacts and refreshes missing/stale sources.'
        required: false
        default: reuse-same-day
        type: choice
        options:
          - reuse-same-day
          - refresh-missing-stale
          - force-refresh
      publish_release:
        description: 'Create or update the weekly GitHub Release during a manual run. Not allowed for dry-run/candidate-only.'
        required: false
        default: false
        type: boolean
      rebuild_week:
        description: 'Restore a specific past week (e.g. 2026-W21). Requires run_mode=restore; skips crawl and hydrates from publish.'
        required: false
        default: ''
        type: string
      analysis_path:
        description: 'Analysis path. map-reduce-dry-run is allowed only with dry-run/candidate-only and never promotes content.'
        required: false
        default: single-pass
        type: choice
        options:
          - single-pass
          - map-reduce-dry-run

permissions:
  contents: read

concurrency:
  group: weekly-crawl
  cancel-in-progress: false

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: Check out repository # zizmor: ignore[artipacked] crawl job pushes to the publish branch; checkout token is reused by a later git push
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Validate rerun mode
        id: rerun-mode
        env:
          RUN_MODE: ${{ inputs.run_mode || 'normal' }}
          SOURCE_REFRESH_POLICY: ${{ inputs.source_refresh_policy || 'reuse-same-day' }}
          REBUILD_WEEK: ${{ inputs.rebuild_week || '' }}
          PUBLISH_RELEASE: ${{ inputs.publish_release || false }}
        run: |
          set -euo pipefail
          ARGS=(--run-mode "$RUN_MODE" --source-refresh-policy "$SOURCE_REFRESH_POLICY" --rebuild-week "$REBUILD_WEEK" --summary-json data/diagnostics/rerun-mode.json)
          if [ "$PUBLISH_RELEASE" = "true" ]; then
            ARGS+=(--publish-release)
          fi
          python3 scripts/rerun_modes.py "${ARGS[@]}"
          echo "run_mode=$RUN_MODE" >> "$GITHUB_OUTPUT"
          echo "source_refresh_policy=$SOURCE_REFRESH_POLICY" >> "$GITHUB_OUTPUT"

      - name: Find latest successful crawl cache
        id: previous-cache-run
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const workflowId = 'crawl-and-publish.yml';
            const branch = context.payload.repository.default_branch;
            const currentRunId = String(context.runId);
            const perPage = 100;
            let page = 1;
            let previous = null;

            try {
              while (!previous) {
                const { data } = await github.rest.actions.listWorkflowRuns({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: workflowId,
                  branch,
                  status: 'completed',
                  per_page: perPage,
                  page,
                });

                previous = data.workflow_runs.find((run) => run.conclusion === 'success' && String(run.id) !== currentRunId) ?? null;
                if (previous || data.workflow_runs.length < perPage) {
                  break;
                }

                page += 1;
              }

              core.setOutput('run_id', previous ? String(previous.id) : '');
              core.info(previous ? `Restoring crawl cache from run ${previous.id}.` : 'No previous successful crawl cache found.');
            } catch (error) {
              core.warning(`Skipping cache restore lookup: ${error.message}`);
              core.setOutput('run_id', '');
            }

      - name: Restore previous crawl cache
        if: steps.previous-cache-run.outputs.run_id != ''
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.previous-cache-run.outputs.run_id }}
          name: crawl-cache
          path: data/cache/

      - name: Download previous raw artifacts for same-day reuse
        if: ${{ steps.previous-cache-run.outputs.run_id != '' && !inputs.rebuild_week }}
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.previous-cache-run.outputs.run_id }}
          name: raw-data
          path: .artifact-reuse/raw-data/

      - name: Download previous snapshots for same-day reuse
        if: ${{ steps.previous-cache-run.outputs.run_id != '' && !inputs.rebuild_week }}
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.previous-cache-run.outputs.run_id }}
          name: crawl-snapshots
          path: .artifact-reuse/snapshots/

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Run crawler
        if: ${{ !inputs.rebuild_week }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_REFRESH_POLICY: ${{ steps.rerun-mode.outputs.source_refresh_policy }}
        run: |
          set -euo pipefail
          WEEK=$(date -u +%Y-W%V)
          CURRENT_DATETIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          CODE_SHA=$(git hash-object scripts/crawl.py squadscope.topic.yml 2>/dev/null | sha256sum | cut -d' ' -f1)
          python scripts/crawl.py \
            --reuse-artifact ".artifact-reuse/raw-data/${WEEK}.json" \
            --source-refresh-policy "$SOURCE_REFRESH_POLICY" \
            --run-started-at "$CURRENT_DATETIME" \
            --current-code-sha "$CODE_SHA"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Crawl external news RSS feeds
        if: ${{ !inputs.rebuild_week }}
        env:
          SOURCE_REFRESH_POLICY: ${{ steps.rerun-mode.outputs.source_refresh_policy }}
        run: |
          WEEK=$(date -u +%Y-W%V)
          CURRENT_DATETIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SINCE=$(date -u -d '7 days ago' +%Y-%m-%d)
          UNTIL=$(date -u +%Y-%m-%d)
          CODE_SHA=$(git hash-object scripts/techcrunch_crawler.py config/external_news_sources.json 2>/dev/null | sha256sum | cut -d' ' -f1)
          python scripts/techcrunch_crawler.py \
            --sources config/external_news_sources.json \
            --output "data/raw/${WEEK}-external-news.json" \
            --since "$SINCE" \
            --until "$UNTIL" \
            --reuse-artifact ".artifact-reuse/raw-data/${WEEK}-external-news.json" \
            --source-refresh-policy "$SOURCE_REFRESH_POLICY" \
            --run-started-at "$CURRENT_DATETIME" \
            --current-code-sha "$CODE_SHA"
          python3 - <<'PY' "data/raw/${WEEK}-external-news.json"
          import json
          import sys
          from pathlib import Path

          path = Path(sys.argv[1])
          payload = json.loads(path.read_text(encoding="utf-8"))
          metadata = payload.get("metadata", {})
          print(
              "::notice::External news artifact "
              f"size_bytes={path.stat().st_size} "
              f"articles={metadata.get('total_articles', 0)} "
              f"relevant={metadata.get('relevant_articles', 0)} "
              f"dedupe={metadata.get('dedupe_count', 0)} "
              f"checksum={metadata.get('artifact_checksum', '')[:12]}"
          )
          PY

      - name: Upload raw crawl artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: raw-data
          path: data/raw/
          if-no-files-found: warn

      - name: Upload snapshot artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: crawl-snapshots
          path: data/snapshots/
          if-no-files-found: warn

      - name: Upload cache artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: crawl-cache
          path: data/cache/
          if-no-files-found: warn

      - name: Commit crawl data to data branch
        if: ${{ !inputs.rebuild_week && inputs.run_mode != 'dry-run' && inputs.run_mode != 'candidate-only' }}
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          DATA_BRANCH: publish
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Save crawl output before switching branches
          cp -r data/raw crawl-raw-backup
          cp -r data/snapshots crawl-snapshots-backup
          # Fetch or create the unprotected data branch
          if git fetch origin "$DATA_BRANCH" 2>/dev/null; then
            EXPECTED_PUBLISH_SHA=$(git rev-parse "origin/$DATA_BRANCH")
            git checkout -f -B "$DATA_BRANCH" "origin/$DATA_BRANCH"
          else
            EXPECTED_PUBLISH_SHA=""
            git checkout -f -B "$DATA_BRANCH" "origin/$DEFAULT_BRANCH"
          fi
          # Restore crawl output on top of data branch
          mkdir -p data/raw data/snapshots
          cp -r crawl-raw-backup/* data/raw/ 2>/dev/null || true
          cp -r crawl-snapshots-backup/* data/snapshots/ 2>/dev/null || true
          rm -rf crawl-raw-backup crawl-snapshots-backup
          if git diff --quiet -- data/raw data/snapshots; then
            echo "No changes to data/raw or data/snapshots. Skipping."
            exit 0
          fi
          COUNTER=$(cat .squad/run-counter.txt 2>/dev/null || echo 0)
          COUNTER=$((COUNTER + 1))
          printf '%s\n' "$COUNTER" > .squad/run-counter.txt
          WEEK=$(date +%Y-W%V)
          git add data/raw/ data/snapshots/ .squad/run-counter.txt
          git diff --cached --quiet && exit 0
          git commit -m "data: weekly crawl $WEEK [run #${GITHUB_RUN_ID}]"
          if [ -n "$EXPECTED_PUBLISH_SHA" ]; then
            git push --force-with-lease="refs/heads/$DATA_BRANCH:$EXPECTED_PUBLISH_SHA" origin HEAD:"$DATA_BRANCH"
          else
            git push origin HEAD:"$DATA_BRANCH"
          fi

  analyze:
    needs: crawl
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      issues: write
    outputs:
      week: ${{ steps.analysis-context.outputs.week }}
      summary_file: ${{ steps.analysis-context.outputs.published_output_file }}
      candidate_summary_file: ${{ steps.analysis-context.outputs.candidate_output_file }}
      publish_manifest_file: ${{ steps.analysis-context.outputs.publish_manifest_file }}
      current_datetime: ${{ steps.analysis-context.outputs.current_datetime }}
      publish_base_sha: ${{ steps.publish-base.outputs.sha }}
      publish_head_sha: ${{ steps.publish-base.outputs.sha }}
      run_mode: ${{ steps.analysis-context.outputs.run_mode }}

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Download raw crawl artifact
        if: ${{ !inputs.rebuild_week }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: raw-data
          path: data/raw/

      - name: Hydrate from publish (rebuild mode)
        if: ${{ inputs.rebuild_week }}
        env:
          REBUILD_WEEK: ${{ inputs.rebuild_week }}
        run: |
          set -euo pipefail
          if ! [[ "$REBUILD_WEEK" =~ ^[0-9]{4}-W[0-9]{2}$ ]]; then
            echo "::error::Invalid rebuild_week format. Expected YYYY-WNN (e.g. 2026-W21), got: $REBUILD_WEEK"
            exit 1
          fi
          git fetch origin publish
          mkdir -p data/raw data/analyzed data/snapshots
          git checkout origin/publish -- "data/raw/${REBUILD_WEEK}.json"
          git checkout origin/publish -- "data/raw/${REBUILD_WEEK}-external-news.json" 2>/dev/null || true
          git checkout origin/publish -- "data/raw/${REBUILD_WEEK}-techcrunch.json" 2>/dev/null || true
          git checkout origin/publish -- "data/snapshots/${REBUILD_WEEK}-stars.json" 2>/dev/null || true
          # Also hydrate ALL prior analyzed files so rollups have correct historical context
          git ls-tree -r --name-only origin/publish -- data/analyzed/ | while read -r f; do
            git checkout origin/publish -- "$f" 2>/dev/null || true
          done

      - name: Record publish branch base
        id: publish-base
        run: |
          set -euo pipefail
          if git fetch origin publish 2>/dev/null; then
            echo "sha=$(git rev-parse origin/publish)" >> "$GITHUB_OUTPUT"
          else
            echo "sha=" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Prepare analysis context
        id: analysis-context
        env:
          REBUILD_WEEK: ${{ inputs.rebuild_week || '' }}
          RUN_MODE: ${{ inputs.run_mode || 'normal' }}
          SOURCE_REFRESH_POLICY: ${{ inputs.source_refresh_policy || 'reuse-same-day' }}
        run: |
          mkdir -p data/analyzed data/candidates
          CURRENT_DATETIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          readarray -t CONTEXT_LINES < <(python3 - <<'PY' "$CURRENT_DATETIME"
          import json
          import os
          import sys
          from datetime import UTC, datetime
          from pathlib import Path

          current_datetime = sys.argv[1]
          run_datetime = datetime.fromisoformat(current_datetime.replace("Z", "+00:00")).astimezone(UTC)
          rebuild_week = os.environ.get("REBUILD_WEEK", "").strip()
          if rebuild_week:
              week = rebuild_week
          else:
              iso_year, iso_week, _ = run_datetime.isocalendar()
              week = f"{iso_year}-W{iso_week:02d}"
          week_file = Path("data/raw") / f"{week}.json"
          if not week_file.exists():
              raise SystemExit(f"Missing raw payload for current run: {week_file}")
          payload = json.loads(week_file.read_text(encoding="utf-8"))
          if payload.get("week") != week:
              raise SystemExit(f"Raw payload week mismatch: expected {week}, found {payload.get('week')!r}")
          print(f"week_file={week_file.as_posix()}")
          print(f"week={week}")
          run_id = os.environ.get("GITHUB_RUN_ID", "local")
          candidate_dir = Path("data/candidates") / week / run_id
          print(f"candidate_output_file={(candidate_dir / f'{week}-summary.md').as_posix()}")
          print(f"publish_manifest_file={(candidate_dir / 'publish-manifest.json').as_posix()}")
          print(f"analysis_gate_report_file={(candidate_dir / 'analysis-gate-report.json').as_posix()}")
          print(f"published_output_file=data/analyzed/{week}-summary.md")
          PY
          )
          {
            printf '%s\n' "${CONTEXT_LINES[@]}"
            echo "current_datetime=$CURRENT_DATETIME"
            echo "run_mode=$RUN_MODE"
            echo "source_refresh_policy=$SOURCE_REFRESH_POLICY"
          } >> "$GITHUB_OUTPUT"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run correlation and press context
        id: press-context
        env:
          IN_WEEK: ${{ steps.analysis-context.outputs.week }}
          IN_WEEK_FILE: ${{ steps.analysis-context.outputs.week_file }}
        run: |
          set -euo pipefail
          WEEK="$IN_WEEK"
          WEEK_FILE="$IN_WEEK_FILE"
          TC_FILE="data/raw/${WEEK}-external-news.json"
          if [ ! -f "$TC_FILE" ]; then
            TC_FILE="data/raw/${WEEK}-techcrunch.json"
          fi

          # Run correlate if external news data exists
          if [ -f "$TC_FILE" ]; then
            mkdir -p data/analyzed
            python scripts/correlate.py \
              --raw "$WEEK_FILE" \
              --techcrunch "$TC_FILE" \
              --output "data/analyzed/${WEEK}-correlations.json"
          fi

          # Render press context (handles missing files gracefully)
          PRESS_CONTEXT=$(python scripts/render_press_context.py --week "$WEEK")
          PRESS_FILE="data/analyzed/${WEEK}-press-context.md"
          printf '%s\n' "$PRESS_CONTEXT" > "$PRESS_FILE"
          python3 - <<'PY' "$PRESS_FILE"
          import sys
          from pathlib import Path
          from scripts.render_press_context import estimate_tokens

          path = Path(sys.argv[1])
          content = path.read_text(encoding="utf-8")
          print(
              "::notice::Press context "
              f"size_bytes={path.stat().st_size} "
              f"token_estimate={estimate_tokens(content)}"
          )
          PY
          echo "press_file=$PRESS_FILE" >> "$GITHUB_OUTPUT"

      - name: Render and preflight analysis prompt
        id: prompt-preflight
        env:
          IN_WEEK_FILE: ${{ steps.analysis-context.outputs.week_file }}
          IN_WEEK: ${{ steps.analysis-context.outputs.week }}
          IN_OUTPUT_FILE: ${{ steps.analysis-context.outputs.candidate_output_file }}
          IN_CURRENT_DATETIME: ${{ steps.analysis-context.outputs.current_datetime }}
          IN_PRESS_FILE: ${{ steps.press-context.outputs.press_file }}
        run: |
          set -euo pipefail
          WEEK_FILE="$IN_WEEK_FILE"
          WEEK="$IN_WEEK"
          OUTPUT_FILE="$IN_OUTPUT_FILE"
          CURRENT_DATETIME="$IN_CURRENT_DATETIME"
          PRESS_FILE="$IN_PRESS_FILE"
          DIAGNOSTICS_DIR="$(dirname "$OUTPUT_FILE")/diagnostics"
          PROMPT_FILE="data/metrics/analysis-prompt-${WEEK}.md"
          PREFLIGHT_JSON="$DIAGNOSTICS_DIR/analysis-input-manifest.json"
          LEGACY_PREFLIGHT_JSON="$DIAGNOSTICS_DIR/analysis-preflight.json"
          PREFLIGHT_MD="$DIAGNOSTICS_DIR/analysis-preflight.md"
          mkdir -p data/metrics "$(dirname "$OUTPUT_FILE")" "$DIAGNOSTICS_DIR"
          # Hydrate metrics ledger from publish before writing this run's prompt/preflight artifacts.
          git fetch origin publish 2>/dev/null && \
            git checkout origin/publish -- data/metrics/ 2>/dev/null || true
          python3 scripts/analyze_fallback.py \
            --raw-json "$WEEK_FILE" \
            --output "$OUTPUT_FILE" \
            --current-datetime "$CURRENT_DATETIME" \
            --press-context "$PRESS_FILE" \
            --prompt-token-budget "${ANALYSIS_PROMPT_TOKEN_BUDGET:-90000}" \
            --preflight-report-json "$PREFLIGHT_JSON" \
            --preflight-report-md "$PREFLIGHT_MD" \
            --print-prompt > "$PROMPT_FILE"
          cp "$PREFLIGHT_JSON" "$LEGACY_PREFLIGHT_JSON"
          python3 scripts/preflight_cost_check.py \
            --context-files "$PROMPT_FILE"
          python3 - <<'PY' "$PREFLIGHT_JSON"
          import json
          import sys
          from pathlib import Path

          report = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          print(
              "::notice::Analysis preflight "
              f"tokens={report['prompt_tokens']}/{report['prompt_token_budget']} "
              f"bytes={report['prompt_bytes']} "
              f"degraded={report['degraded']} "
              f"publish_eligible={report['publish_eligible']} "
              f"promotion_policy={report.get('promotion_policy', 'unspecified')} "
              f"checksum={report['prompt_checksum_sha256'][:12]}"
          )
          if report.get("degraded") or not report.get("publish_eligible"):
              print(
                  "::warning::Analysis preflight is degraded/compacted or publish-ineligible; "
                  "output will remain staged/candidate-only unless an explicit promotion policy allows it."
              )
          PY
          echo "prompt_file=$PROMPT_FILE" >> "$GITHUB_OUTPUT"
          echo "preflight_report_json=$PREFLIGHT_JSON" >> "$GITHUB_OUTPUT"
          echo "preflight_report_md=$PREFLIGHT_MD" >> "$GITHUB_OUTPUT"

      - name: Install Copilot CLI
        if: ${{ inputs.analysis_path != 'map-reduce-dry-run' }}
        id: install-copilot
        run: npm install -g @github/copilot

      - name: Run analysis
        if: steps.prompt-preflight.outcome == 'success'
        id: run-analysis
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREFLIGHT_REPORT_JSON: ${{ steps.prompt-preflight.outputs.preflight_report_json }}
          IN_OUTPUT_FILE: ${{ steps.analysis-context.outputs.candidate_output_file }}
          IN_WEEK_FILE: ${{ steps.analysis-context.outputs.week_file }}
          IN_WEEK: ${{ steps.analysis-context.outputs.week }}
          IN_CURRENT_DATETIME: ${{ steps.analysis-context.outputs.current_datetime }}
          IN_MANIFEST_FILE: ${{ steps.analysis-context.outputs.publish_manifest_file }}
          IN_PUBLISHED_SUMMARY: ${{ steps.analysis-context.outputs.published_output_file }}
          IN_PRESS_FILE: ${{ steps.press-context.outputs.press_file }}
          IN_ANALYSIS_PATH: ${{ inputs.analysis_path || 'single-pass' }}
          IN_RUN_MODE: ${{ steps.analysis-context.outputs.run_mode }}
          IN_PROMPT_FILE: ${{ steps.prompt-preflight.outputs.prompt_file }}
          IN_GATE_REPORT_FILE: ${{ steps.analysis-context.outputs.analysis_gate_report_file }}
        run: |
          set -euo pipefail
          OUTPUT_FILE="$IN_OUTPUT_FILE"
          WEEK_FILE="$IN_WEEK_FILE"
          WEEK="$IN_WEEK"
          CURRENT_DATETIME="$IN_CURRENT_DATETIME"
          MANIFEST_FILE="$IN_MANIFEST_FILE"
          PUBLISHED_SUMMARY="$IN_PUBLISHED_SUMMARY"
          PRESS_FILE="$IN_PRESS_FILE"
          ANALYSIS_PATH="$IN_ANALYSIS_PATH"
          RUN_MODE="$IN_RUN_MODE"
          ANALYSIS_STARTED=$(date +%s)
          DIAGNOSTICS_DIR="$(dirname "$OUTPUT_FILE")/diagnostics"
          mkdir -p data/metrics "$(dirname "$OUTPUT_FILE")" "$DIAGNOSTICS_DIR"
          PROMPT_FILE="$IN_PROMPT_FILE"

          sanitize_agent_output() {
            python3 scripts/sanitize_agent_output.py --path "$1"
          }

          run_quality_gate() {
            GITHUB_STEP_SUMMARY="" python3 scripts/analysis_gate.py \
              --analysis-file "$OUTPUT_FILE" \
              --raw-json "$WEEK_FILE" \
              --current-datetime "$CURRENT_DATETIME" \
              --source "$1" \
              --model "$2" \
              --repair-safe \
              --report-json "$3"
          }

          if [ "$ANALYSIS_PATH" = "map-reduce-dry-run" ]; then
            if [ "$RUN_MODE" != "dry-run" ] && [ "$RUN_MODE" != "candidate-only" ]; then
              echo "::error::map-reduce-dry-run requires run_mode=dry-run or candidate-only and cannot run in a publishing mode."
              exit 1
            fi
            MAP_REDUCE_DIR="$(dirname "$OUTPUT_FILE")/map-reduce"
            python3 scripts/map_reduce_dry_run.py \
              --raw-json "$WEEK_FILE" \
              --press-context "$PRESS_FILE" \
              --output-dir "$MAP_REDUCE_DIR" \
              --current-datetime "$CURRENT_DATETIME" \
              --run-id "${GITHUB_RUN_ID:-local}" \
              --baseline-summary "$PUBLISHED_SUMMARY"
            cp "$MAP_REDUCE_DIR/${WEEK}-map-reduce-candidate.md" "$OUTPUT_FILE"
            ANALYSIS_SOURCE="map-reduce-dry-run"
            ANALYSIS_MODEL="local-deterministic"
            python3 scripts/track_token_usage.py \
              --stage analysis \
              --source "$ANALYSIS_SOURCE" \
              --model "$ANALYSIS_MODEL" \
              --current-datetime "$CURRENT_DATETIME" \
              --week "$WEEK" \
              --prompt-file "$PROMPT_FILE" \
              --output-file "$OUTPUT_FILE" \
              --input-manifest "$PREFLIGHT_REPORT_JSON"
            rm -f "$PROMPT_FILE"
            echo "analysis_source=$ANALYSIS_SOURCE" >> "$GITHUB_OUTPUT"
            echo "analysis_model=$ANALYSIS_MODEL" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Retry loop: LLM output can be non-deterministically truncated,
          # so retry up to 3 attempts if the quality gate rejects the article.
          MAX_RETRIES=2
          ATTEMPT=0
          GATE_PASSED=false
          ANALYSIS_SOURCE=""
          ANALYSIS_MODEL=""
          LAST_GATE_FINGERPRINT=""
          FINAL_FAILURE_CLASS=""

          if command -v copilot >/dev/null 2>&1; then
            while [ "$GATE_PASSED" = "false" ] && [ "$ATTEMPT" -le "$MAX_RETRIES" ]; do
            if [ "$ATTEMPT" -gt 0 ]; then
              echo "::warning::Quality gate failed on attempt $ATTEMPT; retrying with focused gate diagnostics (attempt $((ATTEMPT + 1))/$((MAX_RETRIES + 1)))..."
              rm -f "$OUTPUT_FILE"
              # Reset any .squad changes from failed attempt
              git checkout -- .squad 2>/dev/null || true
            fi

            echo "::notice::Running Copilot analysis attempt $((ATTEMPT + 1))/$((MAX_RETRIES + 1))"
            TRANSCRIPT_FILE="data/metrics/copilot-transcript-attempt-${ATTEMPT}.md"
            GATE_REPORT="$DIAGNOSTICS_DIR/gate-copilot-cli-attempt-${ATTEMPT}.json"
            CANDIDATE_SNAPSHOT="$DIAGNOSTICS_DIR/candidate-copilot-cli-attempt-${ATTEMPT}.md"
            COPILOT_LOG="$DIAGNOSTICS_DIR/copilot-cli-attempt-${ATTEMPT}.log"
            COPILOT_FAILURE_REPORT="$DIAGNOSTICS_DIR/copilot-cli-failure-attempt-${ATTEMPT}.json"
            rm -f "$TRANSCRIPT_FILE" "$COPILOT_LOG" "$COPILOT_FAILURE_REPORT"
            REPAIR_CONTEXT=""
            if [ "$ATTEMPT" -gt 0 ]; then
              PREVIOUS_REPORT="$DIAGNOSTICS_DIR/gate-copilot-cli-attempt-$((ATTEMPT - 1)).json"
              if [ -f "$PREVIOUS_REPORT" ]; then
                REPAIR_CONTEXT=" Previous gate report: ${PREVIOUS_REPORT}. Correct exactly those validation errors; do not regenerate unrelated content."
              fi
            fi

            # Intentionally rely on Copilot CLI's default model so CI follows the platform-supported default.
            set +e
            copilot \
              --agent squad \
              -p "Farnsworth, read the file at ${PROMPT_FILE} — it contains the weekly data and analysis instructions. Follow them exactly and write the analysis to ${OUTPUT_FILE}.${REPAIR_CONTEXT}" \
              -s \
              --no-ask-user \
              --allow-tool=read \
              --allow-tool=write \
              --allow-tool=glob \
              --allow-tool=grep \
              --share="$TRANSCRIPT_FILE" \
              > "$COPILOT_LOG" 2>&1
            COPILOT_STATUS=$?
            set -e
            if [ "$COPILOT_STATUS" -ne 0 ]; then
              FAILURE_CLASS=$(python3 scripts/copilot_failure.py \
                --log "$COPILOT_LOG" \
                --exit-code "$COPILOT_STATUS" \
                --report-json "$COPILOT_FAILURE_REPORT" \
                --create-token-issue \
                --repo "${GITHUB_REPOSITORY:-jmservera/SquadScope}" \
                --assignee "jmservera" \
                --week "$WEEK" \
                --run-id "${GITHUB_RUN_ID:-local}")
              FINAL_FAILURE_CLASS="$FAILURE_CLASS"
              echo "::warning::Copilot CLI failed on attempt $((ATTEMPT + 1)); class=${FAILURE_CLASS}; report=${COPILOT_FAILURE_REPORT}"
              if [ "$FAILURE_CLASS" = "copilot_token_failure" ] || [ "$FAILURE_CLASS" = "copilot_inaccessible" ]; then
                echo "::error::Copilot access failure (${FAILURE_CLASS}). Renewal issue was created or updated; failing without no-AI fallback. See ${COPILOT_FAILURE_REPORT}."
                exit 1
              fi
              if [ "$FAILURE_CLASS" = "context_too_large" ]; then
                echo "::warning::Non-retryable Copilot analysis failure (${FAILURE_CLASS}). Writing a non-publishable no-AI candidate so the current published article can be preserved. See ${COPILOT_FAILURE_REPORT}."
                break
              fi
              ATTEMPT=$((ATTEMPT + 1))
              continue
            fi

            FINAL_FAILURE_CLASS=""
            sanitize_agent_output "$OUTPUT_FILE"

            # Inline quality gate check (suppress step summary to avoid noise).
            # The gate applies deterministic metadata/schema repairs and writes an auditable report.
            if run_quality_gate copilot-cli copilot-default "$GATE_REPORT"; then
              cp "$OUTPUT_FILE" "$CANDIDATE_SNAPSHOT" 2>/dev/null || true
              cp "$GATE_REPORT" "$IN_GATE_REPORT_FILE" 2>/dev/null || true
              GATE_PASSED=true
              FINAL_TRANSCRIPT="$TRANSCRIPT_FILE"
              ANALYSIS_SOURCE="copilot-cli"
              ANALYSIS_MODEL="copilot-default"
            else
              cp "$OUTPUT_FILE" "$CANDIDATE_SNAPSHOT" 2>/dev/null || true
              CURRENT_GATE_FINGERPRINT=$(python3 -c 'import sys; from pathlib import Path; import scripts.analysis_gate as gate; print(gate.gate_report_fingerprint(Path(sys.argv[1])))' "$GATE_REPORT" 2>/dev/null || true)
              if [ -n "$CURRENT_GATE_FINGERPRINT" ]; then
                if [ -n "$LAST_GATE_FINGERPRINT" ] && [ "$CURRENT_GATE_FINGERPRINT" = "$LAST_GATE_FINGERPRINT" ]; then
                  echo "::error::Repeated deterministic analysis gate failure after repair. See ${GATE_REPORT} and ${CANDIDATE_SNAPSHOT}."
                  break
                fi
                LAST_GATE_FINGERPRINT="$CURRENT_GATE_FINGERPRINT"
              else
                echo "::warning::Gate report missing or invalid; continuing fallback path without deterministic repeat fingerprint. Expected report: ${GATE_REPORT}"
              fi
            fi

            ATTEMPT=$((ATTEMPT + 1))
          done
          else
            FINAL_FAILURE_CLASS="copilot_inaccessible"
            COPILOT_LOG="$DIAGNOSTICS_DIR/copilot-cli-unavailable.log"
            COPILOT_FAILURE_REPORT="$DIAGNOSTICS_DIR/copilot-cli-failure-unavailable.json"
            echo "copilot is not available: command not found" > "$COPILOT_LOG"
            python3 scripts/copilot_failure.py \
              --log "$COPILOT_LOG" \
              --exit-code 127 \
              --report-json "$COPILOT_FAILURE_REPORT" \
              --create-token-issue \
              --repo "${GITHUB_REPOSITORY:-jmservera/SquadScope}" \
              --assignee "jmservera" \
              --week "$WEEK" \
              --run-id "${GITHUB_RUN_ID:-local}" >/dev/null
            echo "::error::Copilot CLI unavailable. Renewal issue was created or updated; failing without no-AI fallback. See ${COPILOT_FAILURE_REPORT}."
            exit 1
          fi

          if [ "$GATE_PASSED" = "false" ]; then
            echo "::warning::No publishable Copilot summary was produced. Final failure class: ${FINAL_FAILURE_CLASS:-quality_gate}. The publish manifest will preserve any existing good weekly article."
            python3 scripts/analyze_fallback.py \
              --raw-json "$WEEK_FILE" \
              --output "$OUTPUT_FILE" \
              --current-datetime "$CURRENT_DATETIME" \
              --press-context "$PRESS_FILE" \
              --no-ai
            sanitize_agent_output "$OUTPUT_FILE"
            NO_AI_GATE_REPORT="$DIAGNOSTICS_DIR/gate-no-ai-attempt-0.json"
            run_quality_gate no-ai none "$NO_AI_GATE_REPORT" || true
            cp "$NO_AI_GATE_REPORT" "$IN_GATE_REPORT_FILE" 2>/dev/null || true
            cp "$OUTPUT_FILE" "$DIAGNOSTICS_DIR/candidate-no-ai-attempt-0.md" 2>/dev/null || true
            ANALYSIS_SOURCE="no-ai"
            ANALYSIS_MODEL="none"
          fi

          # Copy final transcript to canonical location
          if [ -n "${FINAL_TRANSCRIPT:-}" ]; then
            cp "$FINAL_TRANSCRIPT" data/metrics/copilot-transcript.md 2>/dev/null || true
          else
            rm -f data/metrics/copilot-transcript.md
          fi

          TRANSCRIPT_ARGS=""
          if [ -f "data/metrics/copilot-transcript.md" ]; then
            TRANSCRIPT_ARGS="--transcript data/metrics/copilot-transcript.md"
          fi

          python3 scripts/track_token_usage.py \
            --stage analysis \
            --source "$ANALYSIS_SOURCE" \
            --model "$ANALYSIS_MODEL" \
            --current-datetime "$CURRENT_DATETIME" \
            --week "$WEEK" \
            --prompt-file "$PROMPT_FILE" \
            --output-file "$OUTPUT_FILE" \
            --input-manifest "$PREFLIGHT_REPORT_JSON" \
            $TRANSCRIPT_ARGS
          ANALYSIS_DURATION=$(( $(date +%s) - ANALYSIS_STARTED ))
          echo "::notice::Analysis path source=$ANALYSIS_SOURCE model=$ANALYSIS_MODEL duration_seconds=$ANALYSIS_DURATION press_context=$PRESS_FILE"
          rm -f "$PROMPT_FILE"
          # Clean up per-attempt transcripts
          rm -f data/metrics/copilot-transcript-attempt-*.md
          echo "analysis_source=$ANALYSIS_SOURCE" >> "$GITHUB_OUTPUT"
          echo "analysis_model=$ANALYSIS_MODEL" >> "$GITHUB_OUTPUT"

      - name: budget-alerts
        if: always()
        run: |
          python3 scripts/budget_alerts.py --metrics data/metrics/token-usage.jsonl

      - name: quality-check
        id: quality-check
        continue-on-error: true
        env:
          ANALYSIS_FILE: ${{ steps.analysis-context.outputs.candidate_output_file }}
          ANALYSIS_SOURCE: ${{ steps.run-analysis.outputs.analysis_source }}
          ANALYSIS_MODEL: ${{ steps.run-analysis.outputs.analysis_model }}
          RAW_JSON_FILE: ${{ steps.analysis-context.outputs.week_file }}
          CURRENT_DATETIME: ${{ steps.analysis-context.outputs.current_datetime }}
          GATE_REPORT: ${{ steps.analysis-context.outputs.analysis_gate_report_file }}
        run: |
          python3 scripts/analysis_gate.py \
            --analysis-file "$ANALYSIS_FILE" \
            --raw-json "$RAW_JSON_FILE" \
            --current-datetime "$CURRENT_DATETIME" \
            --source "$ANALYSIS_SOURCE" \
            --model "$ANALYSIS_MODEL" \
            --report-json "$GATE_REPORT"

      - name: Emit publish eligibility manifest
        env:
          WEEK: ${{ steps.analysis-context.outputs.week }}
          RUN_ID: ${{ github.run_id }}
          CURRENT_DATETIME: ${{ steps.analysis-context.outputs.current_datetime }}
          CANDIDATE_SUMMARY: ${{ steps.analysis-context.outputs.candidate_output_file }}
          PUBLISHED_SUMMARY: ${{ steps.analysis-context.outputs.published_output_file }}
          RAW_JSON_FILE: ${{ steps.analysis-context.outputs.week_file }}
          ANALYSIS_SOURCE: ${{ steps.run-analysis.outputs.analysis_source }}
          ANALYSIS_MODEL: ${{ steps.run-analysis.outputs.analysis_model }}
          VALIDATION_STATUS: ${{ steps.quality-check.outcome == 'success' && 'passed' || 'failed' }}
          MANIFEST_FILE: ${{ steps.analysis-context.outputs.publish_manifest_file }}
          RUN_MODE: ${{ steps.analysis-context.outputs.run_mode }}
          SOURCE_REFRESH_POLICY: ${{ steps.analysis-context.outputs.source_refresh_policy }}
          GATE_REPORT: ${{ steps.analysis-context.outputs.analysis_gate_report_file }}
          PREFLIGHT_REPORT: ${{ steps.prompt-preflight.outputs.preflight_report_json }}
        run: |
          set -euo pipefail
          git fetch origin publish 2>/dev/null && git checkout origin/publish -- "$PUBLISHED_SUMMARY" 2>/dev/null || true
          ARTIFACT_ARGS=()
          for candidate in \
            "external_news=data/raw/${WEEK}-external-news.json" \
            "techcrunch_news=data/raw/${WEEK}-techcrunch.json" \
            "correlations=data/analyzed/${WEEK}-correlations.json" \
            "press_context=data/analyzed/${WEEK}-press-context.md" \
            "map_reduce_manifest=data/candidates/${WEEK}/${RUN_ID}/map-reduce/manifest.json" \
            "map_reduce_qa=data/candidates/${WEEK}/${RUN_ID}/map-reduce/qa-comparison-report.json"
          do
            path="${candidate#*=}"
            [ -f "$path" ] && ARTIFACT_ARGS+=(--artifact "$candidate")
          done
          python3 scripts/publish_manifest.py create \
            --week "$WEEK" \
            --run-id "$RUN_ID" \
            --current-datetime "$CURRENT_DATETIME" \
            --summary "$CANDIDATE_SUMMARY" \
            --published-summary "$PUBLISHED_SUMMARY" \
            --raw-json "$RAW_JSON_FILE" \
            --analysis-source "$ANALYSIS_SOURCE" \
            --analysis-model "$ANALYSIS_MODEL" \
            --preflight-report "$PREFLIGHT_REPORT" \
            --validation-status "$VALIDATION_STATUS" \
            --run-mode "$RUN_MODE" \
            --source-refresh-policy "$SOURCE_REFRESH_POLICY" \
            --gate-report "$GATE_REPORT" \
            --output "$MANIFEST_FILE" \
            "${ARTIFACT_ARGS[@]}"

      - name: Assert candidate is eligible for promotion
        if: ${{ steps.analysis-context.outputs.run_mode != 'dry-run' && steps.analysis-context.outputs.run_mode != 'candidate-only' }}
        env:
          IN_MANIFEST_FILE: ${{ steps.analysis-context.outputs.publish_manifest_file }}
        run: python3 scripts/publish_manifest.py assert-eligible --manifest "$IN_MANIFEST_FILE"

      - name: Upload analyzed data
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: analyzed-data
          path: data/analyzed/
          if-no-files-found: warn

      - name: Upload analysis candidate
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: analysis-candidate
          path: data/candidates/
          if-no-files-found: warn

  generate:
    needs: analyze
    if: ${{ needs.analyze.outputs.run_mode != 'dry-run' && needs.analyze.outputs.run_mode != 'candidate-only' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    outputs:
      page_path: ${{ steps.generate-content.outputs.page_path }}

    steps:
      - name: Check out repository # zizmor: ignore[artipacked] generate job pushes to the publish branch; checkout token is reused by a later git push
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Download analyzed data artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: analyzed-data
          path: data/analyzed/

      - name: Download analysis candidate artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: analysis-candidate
          path: data/candidates/

      - name: Download raw crawl artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: raw-data
          path: data/raw/

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate weekly content
        id: generate-content
        env:
          WEEK: ${{ needs.analyze.outputs.week }}
          SUMMARY_FILE: ${{ needs.analyze.outputs.candidate_summary_file }}
          MANIFEST_FILE: ${{ needs.analyze.outputs.publish_manifest_file }}
        run: |
          set -euo pipefail
          python3 scripts/publish_manifest.py assert-eligible --manifest "$MANIFEST_FILE"
          python3 - <<'PYGEN' "$WEEK" "$SUMMARY_FILE" "$MANIFEST_FILE" >> "$GITHUB_OUTPUT"
          import json
          import sys
          from pathlib import Path

          import scripts.generate_content as generate_content
          import scripts.publish_manifest as publish_manifest

          week = sys.argv[1]
          summary_path = Path(sys.argv[2])
          manifest_path = Path(sys.argv[3])
          candidate_content = manifest_path.parent / f"{week}-content.md"
          page_path = generate_content.generate_content(summary_path, candidate_content)

          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          manifest["candidate_content_path"] = page_path.as_posix()
          manifest.setdefault("candidate", {})["content_path"] = page_path.as_posix()
          manifest["candidate"]["content_sha256"] = publish_manifest.sha256_file(page_path)
          manifest_path.write_text(json.dumps(manifest, indent=2, sort_keys=True) + "\n", encoding="utf-8")

          final_page_path = generate_content.infer_output_path(week, Path.cwd())
          print(f"page_path={final_page_path.as_posix()}")
          print(f"candidate_content_path={page_path.as_posix()}")
          PYGEN
          python3 scripts/publish_manifest.py assert-eligible --manifest "$MANIFEST_FILE"
          python3 scripts/promotion_guard.py --manifest "$MANIFEST_FILE"

      - name: Hydrate analyzed data from publish
        env:
          WEEK: ${{ needs.analyze.outputs.week }}
          MANIFEST_FILE: ${{ needs.analyze.outputs.publish_manifest_file }}
        run: |
          set -euo pipefail
          python3 scripts/publish_manifest.py assert-eligible --manifest "$MANIFEST_FILE"
          git fetch origin publish
          # Restore prior weeks' analyzed files from publish so generate_rollups.py
          # sees accurate historical data. Skip the current week's file (already
          # present from the downloaded artifact).
          git ls-tree -r --name-only origin/publish -- data/analyzed/ 2>/dev/null | while read -r f; do
            case "$f" in
              *"${WEEK}"*) continue ;;
            esac
            git checkout origin/publish -- "$f" 2>/dev/null || true
          done

      - name: Generate rollups
        run: python3 scripts/generate_rollups.py

      - name: Commit generated content to data branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          DATA_BRANCH: publish
          WEEK: ${{ needs.analyze.outputs.week }}
          PAGE_PATH: ${{ steps.generate-content.outputs.page_path }}
          MANIFEST_FILE: ${{ needs.analyze.outputs.publish_manifest_file }}
          EXPECTED_PUBLISH_SHA: ${{ needs.analyze.outputs.publish_head_sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python3 scripts/publish_manifest.py assert-eligible --manifest "$MANIFEST_FILE"
          cp scripts/publish_safety.py publish-safety-tool.py
          cp scripts/promotion_guard.py promotion-guard-tool.py
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          python3 scripts/promotion_guard.py --manifest "$MANIFEST_FILE"
          python3 scripts/publish_manifest.py assert-eligible --manifest "$MANIFEST_FILE"
          if ! git status --short -- data/analyzed data/candidates data/metrics data/published content/weekly content/monthly content/yearly | grep -q .; then
            echo "No promoted analysis or generated content changes to commit."
            rm -f publish-safety-tool.py promotion-guard-tool.py
            exit 0
          fi
          cp -r data/analyzed analyzed-data-backup
          cp -r data/candidates candidates-data-backup
          cp -r data/metrics metrics-data-backup 2>/dev/null || true
          cp -r data/published published-data-backup 2>/dev/null || true
          cp -r content/weekly content-weekly-backup 2>/dev/null || true
          cp -r content/monthly content-monthly-backup 2>/dev/null || true
          cp -r content/yearly content-yearly-backup 2>/dev/null || true
          # Push to the unprotected data branch
          if git fetch origin "$DATA_BRANCH" 2>/dev/null; then
            CURRENT_PUBLISH_SHA=$(git rev-parse "origin/$DATA_BRANCH")
            if [ -n "$EXPECTED_PUBLISH_SHA" ] && [ "$CURRENT_PUBLISH_SHA" != "$EXPECTED_PUBLISH_SHA" ]; then
              echo "::error::Publish branch drifted between analyze and content promotion: expected $EXPECTED_PUBLISH_SHA, found $CURRENT_PUBLISH_SHA"
              exit 1
            fi
            git checkout -f -B "$DATA_BRANCH" "origin/$DATA_BRANCH"
          else
            CURRENT_PUBLISH_SHA=""
            if [ -n "$EXPECTED_PUBLISH_SHA" ]; then
              echo "::error::Publish branch disappeared between analyze and content promotion: expected $EXPECTED_PUBLISH_SHA"
              exit 1
            fi
            git fetch origin "$DEFAULT_BRANCH"
            git checkout -f -B "$DATA_BRANCH" "origin/$DEFAULT_BRANCH"
          fi
          mkdir -p data/analyzed data/candidates data/metrics data/published content/weekly content/monthly content/yearly
          # generate_content.py returns an absolute path; normalize it before restoring
          # the freshly generated page onto the publish branch checkout.
          case "$PAGE_PATH" in
            "$GITHUB_WORKSPACE"/*) PAGE_PATH="${PAGE_PATH#"$GITHUB_WORKSPACE"/}" ;;
          esac
          PAGE_PATH="${PAGE_PATH#/}"
          case "$PAGE_PATH" in
            content/weekly/*) ;;
            *)
              echo "::error::Expected PAGE_PATH under content/weekly/, got: $PAGE_PATH"
              exit 1
              ;;
          esac
          RELATIVE_FROM_WEEKLY="${PAGE_PATH#content/weekly/}"
          mkdir -p "$(dirname "$PAGE_PATH")"
          cp -r "candidates-data-backup/${WEEK}" data/candidates/
          python3 publish-safety-tool.py backup-existing \
            --week "$WEEK" \
            --run-id "$GITHUB_RUN_ID" \
            --kind content \
            --manifest "$MANIFEST_FILE" \
            --expected-publish-ref "$EXPECTED_PUBLISH_SHA" \
            --actual-publish-ref "$CURRENT_PUBLISH_SHA" \
            --path "data/analyzed/${WEEK}-summary.md" \
            --path "data/analyzed/${WEEK}-correlations.json" \
            --path "data/analyzed/${WEEK}-press-context.md" \
            --path "data/published/${WEEK}/promotion-manifest.json" \
            --path "$PAGE_PATH"
          cp -r metrics-data-backup/* data/metrics/ 2>/dev/null || true
          cp "analyzed-data-backup/${WEEK}-correlations.json" data/analyzed/ 2>/dev/null || true
          cp "analyzed-data-backup/${WEEK}-press-context.md" data/analyzed/ 2>/dev/null || true
          python3 promotion-guard-tool.py --manifest "data/candidates/${WEEK}/${GITHUB_RUN_ID}/publish-manifest.json"
          # Monthly/yearly rollups are safe to copy since generate_rollups.py was seeded
          # with hydrated prior-week data (see Hydrate analyzed data step above)
          cp -r content-monthly-backup/* content/monthly/ 2>/dev/null || true
          cp -r content-yearly-backup/* content/yearly/ 2>/dev/null || true
          rm -rf analyzed-data-backup candidates-data-backup metrics-data-backup published-data-backup content-weekly-backup content-monthly-backup content-yearly-backup publish-safety-tool.py promotion-guard-tool.py
          git add data/analyzed/ data/candidates/ data/metrics/ data/published/ content/weekly/ content/monthly/ content/yearly/ data/backups/
          git diff --cached --quiet && exit 0
          git commit -m "publish: weekly article transaction $WEEK [run #${GITHUB_RUN_ID}]"
          if [ -n "$CURRENT_PUBLISH_SHA" ]; then
            git push --force-with-lease="refs/heads/$DATA_BRANCH:$CURRENT_PUBLISH_SHA" origin HEAD:"$DATA_BRANCH"
          else
            git push origin HEAD:"$DATA_BRANCH"
          fi

      - name: Upload generated content artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: generated-content
          path: |
            content/weekly/
            content/monthly/
            content/yearly/
          if-no-files-found: warn

      - name: Upload promoted analyzed artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: promoted-analyzed-data
          path: data/analyzed/
          if-no-files-found: warn

  deploy:
    needs: [crawl, analyze, generate]
    if: ${{ needs.analyze.outputs.run_mode != 'dry-run' && needs.analyze.outputs.run_mode != 'candidate-only' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      HUGO_VERSION: 0.161.1

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Download raw crawl artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: raw-data
          path: data/raw/

      - name: Download analyzed data artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: promoted-analyzed-data
          path: data/analyzed/

      - name: Download generated content artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: generated-content
          path: content/
          merge-multiple: true

      # Deploy builds from artifacts — no dependency on PR merges to main.
      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Install Hugo
        run: |
          set -euo pipefail
          RELEASE_URL="https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}"
          TARBALL="hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          CHECKSUM_FILE="hugo_${HUGO_VERSION}_checksums.txt"
          curl --fail --silent --show-error --location --retry 10 --retry-delay 5 --retry-max-time 300 --retry-all-errors \
            --output "${TARBALL}" "${RELEASE_URL}/${TARBALL}"
          curl --fail --silent --show-error --location --retry 10 --retry-delay 5 --retry-max-time 300 --retry-all-errors \
            --output "${CHECKSUM_FILE}" "${RELEASE_URL}/${CHECKSUM_FILE}"
          checksum_line="$(awk -v file="${TARBALL}" '$NF == file {print; found=1} END {if (!found) exit 1}' "${CHECKSUM_FILE}")" || {
            echo "Error: No checksum entry for ${TARBALL} found in ${CHECKSUM_FILE}" >&2
            exit 1
          }
          if ! printf '%s\n' "${checksum_line}" | sha256sum --check; then
            echo "Error: Checksum verification failed for ${TARBALL}" >&2
            exit 1
          fi
          rm "${CHECKSUM_FILE}"
          mkdir -p "${HOME}/.local/hugo"
          tar -C "${HOME}/.local/hugo" -xf "${TARBALL}"
          rm "${TARBALL}"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"
          export PATH="${HOME}/.local/hugo:${PATH}"
          hugo version

      - name: Build site
        run: hugo --minify

      - name: Build search index
        run: npx pagefind --site public/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

  podcaster-handoff:
    needs: [analyze, generate, deploy]
    if: ${{ needs.analyze.outputs.run_mode == 'normal' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Download analysis candidate
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: analysis-candidate
          path: data/candidates/

      - name: Notify Podcaster
        env:
          PODCASTER_ENDPOINT: ${{ vars.PODCASTER_ENDPOINT }}
          PODCASTER_API_KEY: ${{ secrets.PODCASTER_API_KEY }}
          WEEK: ${{ needs.analyze.outputs.week }}
          PAGE_PATH: ${{ needs.generate.outputs.page_path }}
          MANIFEST_FILE: ${{ needs.analyze.outputs.publish_manifest_file }}
          RUN_MODE: ${{ needs.analyze.outputs.run_mode }}
          PUBLISH_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          ARTICLE_URL=$(python3 - <<'PY' "$PAGE_PATH"
          import sys
          from scripts.podcaster_handoff import article_url_from_page_path

          print(article_url_from_page_path("https://jmservera.github.io/SquadScope/", sys.argv[1]))
          PY
          )
          if ! python3 scripts/publish_manifest.py assert-eligible --manifest "$MANIFEST_FILE"; then
            echo "::warning::Podcaster handoff skipped because the publish manifest is not eligible."
            exit 0
          fi
          ARGS=(
            --week "$WEEK"
            --article-url "$ARTICLE_URL"
            --article-path "$PAGE_PATH"
            --publish-run-id "$PUBLISH_RUN_ID"
            --publish-mode "$RUN_MODE"
            --manifest "$MANIFEST_FILE"
            --podcast-config config/podcast.json
          )
          if ! python3 scripts/podcaster_handoff.py "${ARGS[@]}"; then
            echo "::warning::Podcaster handoff failed or was rejected; weekly article publication remains complete."
          fi

  notify:
    if: ${{ (github.event_name == 'schedule' || github.event.inputs.publish_release == 'true') && needs.analyze.outputs.run_mode != 'dry-run' && needs.analyze.outputs.run_mode != 'candidate-only' }}
    needs: [analyze, generate, deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      discussions: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: promoted-analyzed-data
          path: data/analyzed/

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: analysis-candidate
          path: data/candidates/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUMMARY_FILE: ${{ needs.analyze.outputs.summary_file }}
          MANIFEST_FILE: ${{ needs.analyze.outputs.publish_manifest_file }}
        run: |
          python3 scripts/publish_manifest.py assert-eligible --manifest "$MANIFEST_FILE"
          WEEK=$(basename "$SUMMARY_FILE" | sed 's/-summary.md//')
          TAG="week-${WEEK}"
          TITLE="Week ${WEEK} — Tech Trends Summary"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::notice::Release $TAG already exists; updating it instead of failing."
            gh release edit "$TAG" --title "$TITLE" --notes-file "$SUMMARY_FILE" --latest
          else
            gh release create "$TAG" --title "$TITLE" --notes-file "$SUMMARY_FILE" --latest
          fi

      - name: Post to Discussions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          set -e
          
          SUMMARY=$(ls -t data/analyzed/*-summary.md | head -1)
          WEEK=$(basename "$SUMMARY" | sed 's/-summary.md//')
          
          # Create discussion via GraphQL (Announcements category)
          REPO_ID=$(gh api "repos/$GH_REPOSITORY" --jq '.node_id')
          if [ -z "$REPO_ID" ]; then
            echo "::error::Failed to get repository node_id"
            exit 1
          fi
          
          CAT_ID=$(gh api graphql -f query='{ repository(owner:"'"$REPO_OWNER"'", name:"'"$REPO_NAME"'") { discussionCategories(first:10) { nodes { id name } } } }' --jq '.data.repository.discussionCategories.nodes[] | select(.name=="Announcements") | .id' 2>/dev/null || echo "")
          if [ -z "$CAT_ID" ]; then
            echo "::warning::Announcements discussion category not found; skipping discussion creation"
            exit 0
          fi
          
          # Safely encode body as JSON
          BODY=$(jq -Rs . < "$SUMMARY")
          
          gh api graphql -f query="mutation { createDiscussion(input: {repositoryId: \"$REPO_ID\", categoryId: \"$CAT_ID\", title: \"Week $WEEK — Tech Trends Summary\", body: $BODY}) { discussion { url } } }"

      - name: Post to webhook
        if: env.WEBHOOK_URL != ''
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          SUMMARY=$(ls -t data/analyzed/*-summary.md | head -1)
          WEEK=$(basename "$SUMMARY" | sed 's/-summary.md//')
          SITE_URL="https://jmservera.github.io/SquadScope/weekly/$(echo "$WEEK" | tr '-' '/' | sed 's/W/w/')/"

          # Build JSON payload with jq to prevent injection via WEEK or SITE_URL
          PAYLOAD=$(jq -n \
            --arg content "📊 **SquadScope Week ${WEEK}** — New tech trends summary published!\n${SITE_URL}" \
            --arg username "SquadScope" \
            '{content: $content, username: $username}')

          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "Webhook post failed (non-critical)"

  notify-failure:
    needs: [crawl, analyze, generate, deploy, notify]
    if: ${{ always() && contains(needs.*.result, 'failure') }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      issues: write

    steps:
      - name: Create or update failure issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          RUN_URL="${SERVER_URL}/${GH_REPO}/actions/runs/${RUN_ID}"
          FAILED_JOBS=$(gh run view "$RUN_ID" --json jobs --jq '[.jobs[] | select(.conclusion=="failure") | .name] | join(", ")')
          if [ -z "$FAILED_JOBS" ]; then
            FAILED_JOBS="unknown"
          fi

          EXISTING=$(gh issue list --state open --search 'in:title "Crawl and publish pipeline failed"' --json number --jq length)
          if [ "$EXISTING" -gt 0 ]; then
            ISSUE_NUM=$(gh issue list --state open --search 'in:title "Crawl and publish pipeline failed"' --json number --jq '.[0].number')
            COMMENT_BODY=$(printf '%s\n\n%s' \
              "Pipeline failed again: ${RUN_URL}" \
              "Failed jobs: ${FAILED_JOBS}")
            gh issue comment "$ISSUE_NUM" --body "$COMMENT_BODY"
            echo "Updated existing issue #$ISSUE_NUM"
          else
            BODY=$(printf '%s\n\n%s\n%s\n\n%s\n%s\n%s' \
              "The Crawl and publish weekly data workflow failed." \
              "**Run:** ${RUN_URL}" \
              "**Failed jobs:** ${FAILED_JOBS}" \
              "Please triage:" \
              "- If transient (network/rate limit), close with context" \
              "- If real bug, assign to the right squad member")
            gh issue create \
              --title "🔴 Crawl and publish pipeline failed (run ${RUN_ID})" \
              --label bug \
              --label squad \
              --body "$BODY"
          fi

  reskill-check:
    needs: [crawl]
    runs-on: ubuntu-latest
    outputs:
      should_reskill: ${{ steps.check.outputs.reskill }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: publish
          persist-credentials: false
        continue-on-error: true

      - name: Fallback to default branch for counter
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ ! -f .squad/run-counter.txt ]; then
            git fetch origin "$DEFAULT_BRANCH" 2>/dev/null || true
            git checkout "origin/$DEFAULT_BRANCH" -- .squad/run-counter.txt 2>/dev/null || true
          fi

      - name: Check reskill trigger
        id: check
        run: |
          COUNTER=$(cat .squad/run-counter.txt 2>/dev/null || echo 0)
          if [ $((COUNTER % 5)) -eq 0 ] && [ "$COUNTER" -gt 0 ]; then
            echo "reskill=true" >> $GITHUB_OUTPUT
            echo "🔄 Reskill triggered at run #$COUNTER"
          else
            echo "reskill=false" >> $GITHUB_OUTPUT
            echo "📊 Run #$COUNTER — next reskill at run #$(( (COUNTER/5 + 1) * 5 ))"
          fi

  reskill:
    needs: [reskill-check]
    if: needs.reskill-check.outputs.should_reskill == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1 # zizmor: ignore[artipacked] reskill job pushes to the publish branch; checkout token is reused by a later git push
        with:
          fetch-depth: 0
          ref: publish
        continue-on-error: true

      - name: Fallback to default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ ! -d .squad ]; then
            git fetch origin "$DEFAULT_BRANCH"
            git checkout "origin/$DEFAULT_BRANCH" -- . 2>/dev/null || true
          fi

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Run reskill
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          COUNTER=$(cat .squad/run-counter.txt 2>/dev/null || echo 0)
          CURRENT_DATETIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          WEEK=$(date -u +%G-W%V)
          RESKILL_OUTPUT=".squad/reskill/${WEEK}.md"
          RESKILL_PROMPT=".squad/reskill/current-prompt.md"
          mkdir -p .squad/skills .squad/reskill data/metrics

          sanitize_agent_output() {
            python3 scripts/sanitize_agent_output.py --path "$1"
          }

          # Primary path: Copilot CLI with agent identity
          RESKILL_SOURCE="copilot-cli"
          RESKILL_MODEL="copilot-default"
          python3 scripts/reskill.py --current-datetime "$CURRENT_DATETIME" --output "$RESKILL_OUTPUT" --prompt-output "$RESKILL_PROMPT" --print-prompt > "$RESKILL_PROMPT" || true

          # Intentionally rely on Copilot CLI's default model so CI follows the platform-supported default.
          if command -v copilot >/dev/null 2>&1 && copilot \
            --agent squad \
            -p "Team, take a nap and reskill" \
            -s \
            --no-ask-user \
            --allow-tool=read \
            --allow-tool=write \
            --allow-tool=glob \
            --allow-tool=grep \
            > /dev/null; then
            echo "✅ Reskill via Copilot CLI with agent identity"
          else
            RESKILL_SOURCE="none"
            RESKILL_MODEL="none"
            rm -f "$RESKILL_PROMPT"
            echo "Copilot CLI reskill failed; no GitHub Models/OpenAI reskill fallback is configured. Writing placeholder trigger log."
            echo "Reskill triggered at run #$COUNTER ($CURRENT_DATETIME)" >> .squad/reskill/trigger-log.txt
          fi

          if [ "$RESKILL_SOURCE" != "none" ]; then
            sanitize_agent_output "$RESKILL_OUTPUT"
          fi

          if [ "$RESKILL_SOURCE" != "none" ]; then
            API_RESPONSE_ARGS=""
            if [ -f "data/metrics/reskill-api-response.json" ]; then
              API_RESPONSE_ARGS="--api-response data/metrics/reskill-api-response.json"
            fi
            python3 scripts/track_token_usage.py \
              --stage reskill \
              --source "$RESKILL_SOURCE" \
              --model "$RESKILL_MODEL" \
              --current-datetime "$CURRENT_DATETIME" \
              --week "$WEEK" \
              --prompt-file "$RESKILL_PROMPT" \
              --output-file "$RESKILL_OUTPUT" \
              $API_RESPONSE_ARGS
            rm -f "$RESKILL_PROMPT"
            echo "🔄 Reskill report generated for run #$COUNTER"
          fi

          if ! git status --short -- .squad data/metrics | grep -q .; then
            echo "No .squad or token usage changes to commit."
            exit 0
          fi

          cp -r .squad squad-state-backup
          cp -r data/metrics reskill-metrics-backup
          DATA_BRANCH="publish"
          if git fetch origin "$DATA_BRANCH" 2>/dev/null; then
            git checkout -f -B "$DATA_BRANCH" "origin/$DATA_BRANCH"
          else
            git fetch origin "$DEFAULT_BRANCH"
            git checkout -f -B "$DATA_BRANCH" "origin/$DEFAULT_BRANCH"
          fi
          cp -r squad-state-backup/* .squad/ 2>/dev/null || true
          mkdir -p data/metrics
          cp -r reskill-metrics-backup/* data/metrics/ 2>/dev/null || true
          rm -rf squad-state-backup reskill-metrics-backup
          git add .squad/ data/metrics/
          git diff --cached --quiet && exit 0
          git commit -m "chore: reskill state update [run #${GITHUB_RUN_ID}]"
          git push origin "$DATA_BRANCH"
