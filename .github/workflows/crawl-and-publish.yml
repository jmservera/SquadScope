name: Crawl and publish weekly data

on:
  schedule:
    - cron: '30 8 * * 1'
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Create or update the weekly GitHub Release during a manual run.'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: weekly-crawl
  cancel-in-progress: false

env:
  PYTHONPATH: ${{ github.workspace }}
  GITHUB_MODELS_MODEL: ${{ vars.GITHUB_MODELS_MODEL || 'openai/gpt-4o' }}

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Find latest successful crawl cache
        id: previous-cache-run
        uses: actions/github-script@v7
        with:
          script: |
            const workflowId = 'crawl-and-publish.yml';
            const branch = context.payload.repository.default_branch;
            const currentRunId = String(context.runId);
            const perPage = 100;
            let page = 1;
            let previous = null;

            try {
              while (!previous) {
                const { data } = await github.rest.actions.listWorkflowRuns({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: workflowId,
                  branch,
                  status: 'completed',
                  per_page: perPage,
                  page,
                });

                previous = data.workflow_runs.find((run) => run.conclusion === 'success' && String(run.id) !== currentRunId) ?? null;
                if (previous || data.workflow_runs.length < perPage) {
                  break;
                }

                page += 1;
              }

              core.setOutput('run_id', previous ? String(previous.id) : '');
              core.info(previous ? `Restoring crawl cache from run ${previous.id}.` : 'No previous successful crawl cache found.');
            } catch (error) {
              core.warning(`Skipping cache restore lookup: ${error.message}`);
              core.setOutput('run_id', '');
            }

      - name: Restore previous crawl cache
        if: steps.previous-cache-run.outputs.run_id != ''
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.previous-cache-run.outputs.run_id }}
          name: crawl-cache
          path: data/cache/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run crawler
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/crawl.py

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Crawl TechCrunch RSS
        run: |
          WEEK=$(date +%Y-W%V)
          SINCE=$(date -d '7 days ago' +%Y-%m-%d)
          python scripts/techcrunch_crawler.py \
            --output "data/raw/${WEEK}-techcrunch.json" \
            --since "$SINCE"

      - name: Upload raw crawl artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raw-data
          path: data/raw/
          if-no-files-found: warn

      - name: Upload snapshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawl-snapshots
          path: data/snapshots/
          if-no-files-found: warn

      - name: Upload cache artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawl-cache
          path: data/cache/
          if-no-files-found: warn

      - name: Commit crawl data to data branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          DATA_BRANCH: publish
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Save crawl output before switching branches
          cp -r data/raw crawl-raw-backup
          cp -r data/snapshots crawl-snapshots-backup
          # Fetch or create the unprotected data branch
          if git fetch origin "$DATA_BRANCH" 2>/dev/null; then
            git checkout -f -B "$DATA_BRANCH" "origin/$DATA_BRANCH"
          else
            git checkout -f -B "$DATA_BRANCH" "origin/$DEFAULT_BRANCH"
          fi
          # Restore crawl output on top of data branch
          mkdir -p data/raw data/snapshots
          cp -r crawl-raw-backup/* data/raw/ 2>/dev/null || true
          cp -r crawl-snapshots-backup/* data/snapshots/ 2>/dev/null || true
          rm -rf crawl-raw-backup crawl-snapshots-backup
          if git diff --quiet -- data/raw data/snapshots; then
            echo "No changes to data/raw or data/snapshots. Skipping."
            exit 0
          fi
          COUNTER=$(cat .squad/run-counter.txt 2>/dev/null || echo 0)
          COUNTER=$((COUNTER + 1))
          printf '%s\n' "$COUNTER" > .squad/run-counter.txt
          WEEK=$(date +%Y-W%V)
          git add data/raw/ data/snapshots/ .squad/run-counter.txt
          git diff --cached --quiet && exit 0
          git commit -m "data: weekly crawl $WEEK [run #${GITHUB_RUN_ID}]"
          git push origin "$DATA_BRANCH"

  analyze:
    needs: crawl
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    outputs:
      week: ${{ steps.analysis-context.outputs.week }}
      summary_file: ${{ steps.analysis-context.outputs.output_file }}
      current_datetime: ${{ steps.analysis-context.outputs.current_datetime }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Download raw crawl artifact
        uses: actions/download-artifact@v4
        with:
          name: raw-data
          path: data/raw/

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Prepare analysis context
        id: analysis-context
        run: |
          mkdir -p data/analyzed
          CURRENT_DATETIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          readarray -t CONTEXT_LINES < <(python3 - <<'PY' "$CURRENT_DATETIME"
          import json
          import sys
          from datetime import UTC, datetime
          from pathlib import Path

          current_datetime = sys.argv[1]
          run_datetime = datetime.fromisoformat(current_datetime.replace("Z", "+00:00")).astimezone(UTC)
          iso_year, iso_week, _ = run_datetime.isocalendar()
          week = f"{iso_year}-W{iso_week:02d}"
          week_file = Path("data/raw") / f"{week}.json"
          if not week_file.exists():
              raise SystemExit(f"Missing raw payload for current run: {week_file}")
          payload = json.loads(week_file.read_text(encoding="utf-8"))
          if payload.get("week") != week:
              raise SystemExit(f"Raw payload week mismatch: expected {week}, found {payload.get('week')!r}")
          print(f"week_file={week_file.as_posix()}")
          print(f"week={week}")
          print(f"output_file=data/analyzed/{week}-summary.md")
          PY
          )
          {
            printf '%s\n' "${CONTEXT_LINES[@]}"
            echo "current_datetime=$CURRENT_DATETIME"
          } >> "$GITHUB_OUTPUT"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run correlation and press context
        id: press-context
        run: |
          set -euo pipefail
          WEEK="${{ steps.analysis-context.outputs.week }}"
          WEEK_FILE="${{ steps.analysis-context.outputs.week_file }}"
          TC_FILE="data/raw/${WEEK}-techcrunch.json"

          # Run correlate if TechCrunch data exists
          if [ -f "$TC_FILE" ]; then
            mkdir -p data/analyzed
            python scripts/correlate.py \
              --raw "$WEEK_FILE" \
              --techcrunch "$TC_FILE" \
              --output "data/analyzed/${WEEK}-correlations.json"
          fi

          # Render press context (handles missing files gracefully)
          PRESS_CONTEXT=$(python scripts/render_press_context.py --week "$WEEK")
          PRESS_FILE="data/analyzed/${WEEK}-press-context.md"
          printf '%s\n' "$PRESS_CONTEXT" > "$PRESS_FILE"
          echo "press_file=$PRESS_FILE" >> "$GITHUB_OUTPUT"

      - name: Pre-flight cost check
        id: preflight-cost
        run: |
          WEEK_FILE="${{ steps.analysis-context.outputs.week_file }}"
          CONTEXT_FILES=("$WEEK_FILE")
          if [ -f ".squad/skills/wisdom.md" ]; then
            CONTEXT_FILES+=(".squad/skills/wisdom.md")
          fi
          for f in .squad/skills/*.md; do
            [ -f "$f" ] && CONTEXT_FILES+=("$f")
          done
          # Use the generic Copilot default cost profile so the workflow never pins a stale CLI model.
          python3 scripts/preflight_cost_check.py \
            --context-files "${CONTEXT_FILES[@]}"

      - name: Install Copilot CLI
        id: install-copilot
        run: npm install -g @github/copilot

      - name: Run analysis
        if: steps.preflight-cost.outcome == 'success'
        id: run-analysis
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          OUTPUT_FILE="${{ steps.analysis-context.outputs.output_file }}"
          WEEK_FILE="${{ steps.analysis-context.outputs.week_file }}"
          WEEK="${{ steps.analysis-context.outputs.week }}"
          CURRENT_DATETIME="${{ steps.analysis-context.outputs.current_datetime }}"
          PRESS_FILE="${{ steps.press-context.outputs.press_file }}"
          mkdir -p data/metrics
          # Hydrate metrics ledger from publish so track_token_usage.py appends to
          # the canonical token-usage.jsonl rather than starting fresh each run.
          git fetch origin publish 2>/dev/null && \
            git checkout origin/publish -- data/metrics/ 2>/dev/null || true
          PROMPT_FILE=$(mktemp)
          python3 scripts/analyze_fallback.py --raw-json "$WEEK_FILE" --output "$OUTPUT_FILE" --current-datetime "$CURRENT_DATETIME" --print-prompt > "$PROMPT_FILE"

          sanitize_agent_output() {
            python3 scripts/sanitize_agent_output.py --path "$1"
          }

          # Append press context to prompt if available
          if [ -f "$PRESS_FILE" ] && [ -s "$PRESS_FILE" ]; then
            printf '\n\n---\n## Press Context\n\n' >> "$PROMPT_FILE"
            cat "$PRESS_FILE" >> "$PROMPT_FILE"
          fi

          if ! command -v copilot >/dev/null 2>&1; then
            echo "::error::Copilot CLI unavailable; rerun crawl-and-publish when Copilot is available."
            exit 1
          fi

          # Retry loop: LLM output can be non-deterministically truncated,
          # so retry up to 3 attempts if the quality gate rejects the article.
          MAX_RETRIES=2
          ATTEMPT=0
          GATE_PASSED=false

          while [ "$GATE_PASSED" = "false" ] && [ "$ATTEMPT" -le "$MAX_RETRIES" ]; do
            if [ "$ATTEMPT" -gt 0 ]; then
              echo "::warning::Quality gate failed on attempt $ATTEMPT, retrying (attempt $((ATTEMPT + 1))/$((MAX_RETRIES + 1)))..."
              rm -f "$OUTPUT_FILE"
              # Reset any .squad changes from failed attempt
              git checkout -- .squad 2>/dev/null || true
            fi

            echo "::notice::Running Copilot analysis attempt $((ATTEMPT + 1))/$((MAX_RETRIES + 1))"
            TRANSCRIPT_FILE="data/metrics/copilot-transcript-attempt-${ATTEMPT}.md"
            rm -f "$TRANSCRIPT_FILE"

            # Intentionally rely on Copilot CLI's default model so CI follows the platform-supported default.
            if ! copilot \
              --agent squad \
              -p "Farnsworth, read the file at ${PROMPT_FILE} — it contains the weekly data and analysis instructions. Follow them exactly and write the analysis to ${OUTPUT_FILE}." \
              -s \
              --no-ask-user \
              --allow-tool=read \
              --allow-tool=write \
              --allow-tool=glob \
              --allow-tool=grep \
              --share="$TRANSCRIPT_FILE" \
              > /dev/null; then
              echo "::warning::Copilot CLI failed on attempt $((ATTEMPT + 1))"
              ATTEMPT=$((ATTEMPT + 1))
              continue
            fi

            if ! sanitize_agent_output "$OUTPUT_FILE"; then
              echo "::warning::Sanitization failed on attempt $((ATTEMPT + 1))"
              ATTEMPT=$((ATTEMPT + 1))
              continue
            fi

            # Inline quality gate check (suppress step summary to avoid noise)
            if GITHUB_STEP_SUMMARY="" python3 scripts/analysis_gate.py \
              --analysis-file "$OUTPUT_FILE" \
              --raw-json "$WEEK_FILE" \
              --current-datetime "$CURRENT_DATETIME" \
              --source copilot-cli 2>&1; then
              GATE_PASSED=true
              FINAL_TRANSCRIPT="$TRANSCRIPT_FILE"
            fi

            ATTEMPT=$((ATTEMPT + 1))
          done

          if [ "$GATE_PASSED" = "false" ]; then
            echo "::error::Analysis quality gate failed after $((MAX_RETRIES + 1)) attempts. The LLM did not produce a conforming article."
            exit 1
          fi

          ANALYSIS_SOURCE="copilot-cli"
          ANALYSIS_MODEL="copilot-default"

          # Copy final transcript to canonical location
          cp "$FINAL_TRANSCRIPT" data/metrics/copilot-transcript.md 2>/dev/null || true

          TRANSCRIPT_ARGS=""
          if [ -f "data/metrics/copilot-transcript.md" ]; then
            TRANSCRIPT_ARGS="--transcript data/metrics/copilot-transcript.md"
          fi

          python3 scripts/track_token_usage.py \
            --stage analysis \
            --source "$ANALYSIS_SOURCE" \
            --model "$ANALYSIS_MODEL" \
            --current-datetime "$CURRENT_DATETIME" \
            --week "$WEEK" \
            --prompt-file "$PROMPT_FILE" \
            --output-file "$OUTPUT_FILE" \
            $TRANSCRIPT_ARGS
          rm -f "$PROMPT_FILE"
          # Clean up per-attempt transcripts
          rm -f data/metrics/copilot-transcript-attempt-*.md
          echo "analysis_source=$ANALYSIS_SOURCE" >> "$GITHUB_OUTPUT"

      - name: quality-check
        env:
          ANALYSIS_FILE: ${{ steps.analysis-context.outputs.output_file }}
          ANALYSIS_SOURCE: ${{ steps.run-analysis.outputs.analysis_source }}
          RAW_JSON_FILE: ${{ steps.analysis-context.outputs.week_file }}
          CURRENT_DATETIME: ${{ steps.analysis-context.outputs.current_datetime }}
        run: |
          python3 scripts/analysis_gate.py \
            --analysis-file "$ANALYSIS_FILE" \
            --raw-json "$RAW_JSON_FILE" \
            --current-datetime "$CURRENT_DATETIME" \
            --source "$ANALYSIS_SOURCE"

      - name: Commit analysis and learnings to data branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          DATA_BRANCH: publish
          WEEK: ${{ steps.analysis-context.outputs.week }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Check for analysis data OR squad learning state changes
          if ! git status --short -- data/analyzed data/metrics .squad | grep -q .; then
            echo "No analyzed data, token usage, or learning state changes to commit."
            exit 0
          fi
          cp -r data/analyzed analyzed-data-backup
          cp -r data/metrics metrics-data-backup
          # Preserve any .squad changes written by the agent (learnings, skills)
          if git status --short -- .squad | grep -q .; then
            cp -r .squad squad-learning-backup
            HAS_LEARNINGS=true
          else
            HAS_LEARNINGS=false
          fi
          # Push to the unprotected data branch
          if git fetch origin "$DATA_BRANCH" 2>/dev/null; then
            git checkout -f -B "$DATA_BRANCH" "origin/$DATA_BRANCH"
          else
            git fetch origin "$DEFAULT_BRANCH"
            git checkout -f -B "$DATA_BRANCH" "origin/$DEFAULT_BRANCH"
          fi
          mkdir -p data/analyzed data/metrics
          # Only copy current week's analysis files — do not overwrite prior weeks
          # Required: current week's summary must exist or the pipeline is broken
          cp "analyzed-data-backup/${WEEK}-summary.md" data/analyzed/
          # Optional sidecars: conditionally generated
          cp "analyzed-data-backup/${WEEK}-correlations.json" data/analyzed/ 2>/dev/null || true
          cp "analyzed-data-backup/${WEEK}-press-context.md" data/analyzed/ 2>/dev/null || true
          cp -r metrics-data-backup/* data/metrics/ 2>/dev/null || true
          rm -rf analyzed-data-backup metrics-data-backup
          # Restore squad learning state
          if [ "$HAS_LEARNINGS" = "true" ]; then
            cp -r squad-learning-backup/* .squad/ 2>/dev/null || true
            rm -rf squad-learning-backup
          fi
          git add data/analyzed/ data/metrics/ .squad/
          git diff --cached --quiet && exit 0
          git commit -m "analysis: weekly summary + learnings $WEEK [run #${GITHUB_RUN_ID}]"
          git push origin "$DATA_BRANCH"

      - name: Upload analyzed data
        uses: actions/upload-artifact@v4
        with:
          name: analyzed-data
          path: data/analyzed/
          if-no-files-found: warn

  generate:
    needs: analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    outputs:
      page_path: ${{ steps.generate-content.outputs.page_path }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Download analyzed data artifact
        uses: actions/download-artifact@v4
        with:
          name: analyzed-data
          path: data/analyzed/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate weekly content
        id: generate-content
        env:
          SUMMARY_FILE: ${{ needs.analyze.outputs.summary_file }}
        run: |
          set -euo pipefail
          python3 - <<'PYGEN' "$SUMMARY_FILE" >> "$GITHUB_OUTPUT"
          import sys
          from pathlib import Path

          import scripts.generate_content as generate_content

          summary_path = Path(sys.argv[1])
          page_path = generate_content.generate_content(summary_path)
          print(f"page_path={page_path.as_posix()}")
          PYGEN

      - name: Hydrate analyzed data from publish
        env:
          WEEK: ${{ needs.analyze.outputs.week }}
        run: |
          set -euo pipefail
          git fetch origin publish
          # Restore prior weeks' analyzed files from publish so generate_rollups.py
          # sees accurate historical data. Skip the current week's file (already
          # present from the downloaded artifact).
          git ls-tree -r --name-only origin/publish -- data/analyzed/ 2>/dev/null | while read -r f; do
            case "$f" in
              *"${WEEK}"*) continue ;;
            esac
            git checkout origin/publish -- "$f" 2>/dev/null || true
          done

      - name: Generate rollups
        run: python3 scripts/generate_rollups.py

      - name: Commit generated content to data branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          DATA_BRANCH: publish
          WEEK: ${{ needs.analyze.outputs.week }}
          PAGE_PATH: ${{ steps.generate-content.outputs.page_path }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git status --short -- content/weekly content/monthly content/yearly | grep -q .; then
            echo "No generated content changes to commit."
            exit 0
          fi
          cp -r content/weekly content-weekly-backup 2>/dev/null || true
          cp -r content/monthly content-monthly-backup 2>/dev/null || true
          cp -r content/yearly content-yearly-backup 2>/dev/null || true
          # Push to the unprotected data branch
          if git fetch origin "$DATA_BRANCH" 2>/dev/null; then
            git checkout -f -B "$DATA_BRANCH" "origin/$DATA_BRANCH"
          else
            git fetch origin "$DEFAULT_BRANCH"
            git checkout -f -B "$DATA_BRANCH" "origin/$DEFAULT_BRANCH"
          fi
          mkdir -p content/weekly content/monthly content/yearly
          # Required: use exact page_path from generate-content step; hard-fail if missing
          RELATIVE_FROM_WEEKLY="${PAGE_PATH#content/weekly/}"
          mkdir -p "$(dirname "$PAGE_PATH")"
          cp "content-weekly-backup/${RELATIVE_FROM_WEEKLY}" "$PAGE_PATH"
          # Monthly/yearly rollups are safe to copy since generate_rollups.py was seeded
          # with hydrated prior-week data (see Hydrate analyzed data step above)
          cp -r content-monthly-backup/* content/monthly/ 2>/dev/null || true
          cp -r content-yearly-backup/* content/yearly/ 2>/dev/null || true
          rm -rf content-weekly-backup content-monthly-backup content-yearly-backup
          git add content/weekly/ content/monthly/ content/yearly/
          git diff --cached --quiet && exit 0
          git commit -m "content: weekly page $WEEK [run #${GITHUB_RUN_ID}]"
          git push origin "$DATA_BRANCH"

      - name: Upload generated content artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-content
          path: |
            content/weekly/
            content/monthly/
            content/yearly/
          if-no-files-found: warn

  deploy:
    needs: [crawl, analyze, generate]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      HUGO_VERSION: 0.161.1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Download raw crawl artifact
        uses: actions/download-artifact@v4
        with:
          name: raw-data
          path: data/raw/

      - name: Download analyzed data artifact
        uses: actions/download-artifact@v4
        with:
          name: analyzed-data
          path: data/analyzed/

      - name: Download generated content artifact
        uses: actions/download-artifact@v4
        with:
          name: generated-content
          path: content/
          merge-multiple: true

      # Deploy builds from artifacts — no dependency on PR merges to main.
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install Hugo
        run: |
          set -euo pipefail
          TARBALL="hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          curl -sLJO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/${TARBALL}"
          curl -sLJO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_${HUGO_VERSION}_checksums.txt"
          sha256sum --check "hugo_${HUGO_VERSION}_checksums.txt" --ignore-missing
          rm "hugo_${HUGO_VERSION}_checksums.txt"
          mkdir -p "${HOME}/.local/hugo"
          tar -C "${HOME}/.local/hugo" -xf "${TARBALL}"
          rm "${TARBALL}"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"
          export PATH="${HOME}/.local/hugo:${PATH}"
          hugo version

      - name: Build site
        run: hugo --minify

      - name: Build search index
        run: npx pagefind --site public/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    if: github.event_name == 'schedule' || github.event.inputs.publish_release == 'true'
    needs: [analyze, generate, deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      discussions: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: analyzed-data
          path: data/analyzed/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUMMARY_FILE: ${{ needs.analyze.outputs.summary_file }}
        run: |
          WEEK=$(basename "$SUMMARY_FILE" | sed 's/-summary.md//')

          gh release create "week-${WEEK}" --title "Week ${WEEK} — Tech Trends Summary" --notes-file "$SUMMARY_FILE" --latest

      - name: Post to Discussions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          
          SUMMARY=$(ls -t data/analyzed/*-summary.md | head -1)
          WEEK=$(basename "$SUMMARY" | sed 's/-summary.md//')
          
          # Create discussion via GraphQL (Announcements category)
          REPO_ID=$(gh api repos/${{ github.repository }} --jq '.node_id')
          if [ -z "$REPO_ID" ]; then
            echo "::error::Failed to get repository node_id"
            exit 1
          fi
          
          CAT_ID=$(gh api graphql -f query='{ repository(owner:"${{ github.repository_owner }}", name:"${{ github.event.repository.name }}") { discussionCategories(first:10) { nodes { id name } } } }' --jq '.data.repository.discussionCategories.nodes[] | select(.name=="Announcements") | .id' 2>&1 || echo "")
          if [ -z "$CAT_ID" ]; then
            echo "::warning::Announcements discussion category not found; skipping discussion creation"
            exit 0
          fi
          
          # Safely encode body as JSON
          BODY=$(jq -Rs . < "$SUMMARY")
          
          gh api graphql -f query="mutation { createDiscussion(input: {repositoryId: \"$REPO_ID\", categoryId: \"$CAT_ID\", title: \"Week $WEEK — Tech Trends Summary\", body: $BODY}) { discussion { url } } }"

      - name: Post to webhook
        if: env.WEBHOOK_URL != ''
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          SUMMARY=$(ls -t data/analyzed/*-summary.md | head -1)
          WEEK=$(basename "$SUMMARY" | sed 's/-summary.md//')
          SITE_URL="https://jmservera.github.io/SquadScope/weekly/$(echo "$WEEK" | tr '-' '/' | sed 's/W/w/')/"

          # Build JSON payload with jq to prevent injection via WEEK or SITE_URL
          PAYLOAD=$(jq -n \
            --arg content "📊 **SquadScope Week ${WEEK}** — New tech trends summary published!\n${SITE_URL}" \
            --arg username "SquadScope" \
            '{content: $content, username: $username}')

          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "Webhook post failed (non-critical)"


  reskill-check:
    needs: [crawl]
    runs-on: ubuntu-latest
    outputs:
      should_reskill: ${{ steps.check.outputs.reskill }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: publish
        continue-on-error: true

      - name: Fallback to default branch for counter
        run: |
          if [ ! -f .squad/run-counter.txt ]; then
            git fetch origin "${{ github.event.repository.default_branch }}" 2>/dev/null || true
            git checkout "origin/${{ github.event.repository.default_branch }}" -- .squad/run-counter.txt 2>/dev/null || true
          fi

      - name: Check reskill trigger
        id: check
        run: |
          COUNTER=$(cat .squad/run-counter.txt 2>/dev/null || echo 0)
          if [ $((COUNTER % 5)) -eq 0 ] && [ "$COUNTER" -gt 0 ]; then
            echo "reskill=true" >> $GITHUB_OUTPUT
            echo "🔄 Reskill triggered at run #$COUNTER"
          else
            echo "reskill=false" >> $GITHUB_OUTPUT
            echo "📊 Run #$COUNTER — next reskill at run #$(( (COUNTER/5 + 1) * 5 ))"
          fi

  reskill:
    needs: [reskill-check]
    if: needs.reskill-check.outputs.should_reskill == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: publish
        continue-on-error: true

      - name: Fallback to default branch
        run: |
          if [ ! -d .squad ]; then
            git fetch origin "${{ github.event.repository.default_branch }}"
            git checkout "origin/${{ github.event.repository.default_branch }}" -- . 2>/dev/null || true
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Run reskill
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          COUNTER=$(cat .squad/run-counter.txt 2>/dev/null || echo 0)
          CURRENT_DATETIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          WEEK=$(date -u +%G-W%V)
          RESKILL_OUTPUT=".squad/reskill/${WEEK}.md"
          RESKILL_PROMPT=".squad/reskill/current-prompt.md"
          mkdir -p .squad/skills .squad/reskill data/metrics

          sanitize_agent_output() {
            python3 scripts/sanitize_agent_output.py --path "$1"
          }

          # Primary path: Copilot CLI with agent identity
          RESKILL_SOURCE="copilot-cli"
          RESKILL_MODEL="copilot-default"
          python3 scripts/reskill.py --current-datetime "$CURRENT_DATETIME" --output "$RESKILL_OUTPUT" --prompt-output "$RESKILL_PROMPT" --print-prompt > "$RESKILL_PROMPT" || true

          # Intentionally rely on Copilot CLI's default model so CI follows the platform-supported default.
          if command -v copilot >/dev/null 2>&1 && copilot \
            --agent squad \
            -p "Team, take a nap and reskill" \
            -s \
            --no-ask-user \
            --allow-tool=read \
            --allow-tool=write \
            --allow-tool=glob \
            --allow-tool=grep \
            > /dev/null; then
            echo "✅ Reskill via Copilot CLI with agent identity"
          # Fallback: GitHub Models API via reskill.py
          elif python3 scripts/reskill.py --current-datetime "$CURRENT_DATETIME" --output "$RESKILL_OUTPUT" --prompt-output "$RESKILL_PROMPT"; then
            RESKILL_SOURCE="github-models"
            RESKILL_MODEL="${GITHUB_MODELS_MODEL}"
            echo "⚠️  Copilot CLI unavailable; used GitHub Models API fallback."
          else
            RESKILL_SOURCE="none"
            RESKILL_MODEL="none"
            rm -f "$RESKILL_PROMPT"
            echo "Reskill failed on all paths; writing placeholder trigger log."
            echo "Reskill triggered at run #$COUNTER ($CURRENT_DATETIME)" >> .squad/reskill/trigger-log.txt
          fi

          if [ "$RESKILL_SOURCE" != "none" ]; then
            sanitize_agent_output "$RESKILL_OUTPUT"
          fi

          if [ "$RESKILL_SOURCE" != "none" ]; then
            API_RESPONSE_ARGS=""
            if [ -f "data/metrics/reskill-api-response.json" ]; then
              API_RESPONSE_ARGS="--api-response data/metrics/reskill-api-response.json"
            fi
            python3 scripts/track_token_usage.py \
              --stage reskill \
              --source "$RESKILL_SOURCE" \
              --model "$RESKILL_MODEL" \
              --current-datetime "$CURRENT_DATETIME" \
              --week "$WEEK" \
              --prompt-file "$RESKILL_PROMPT" \
              --output-file "$RESKILL_OUTPUT" \
              $API_RESPONSE_ARGS
            rm -f "$RESKILL_PROMPT"
            echo "🔄 Reskill report generated for run #$COUNTER"
          fi

          if ! git status --short -- .squad data/metrics | grep -q .; then
            echo "No .squad or token usage changes to commit."
            exit 0
          fi

          cp -r .squad squad-state-backup
          cp -r data/metrics reskill-metrics-backup
          DATA_BRANCH="publish"
          if git fetch origin "$DATA_BRANCH" 2>/dev/null; then
            git checkout -f -B "$DATA_BRANCH" "origin/$DATA_BRANCH"
          else
            git fetch origin "$DEFAULT_BRANCH"
            git checkout -f -B "$DATA_BRANCH" "origin/$DEFAULT_BRANCH"
          fi
          cp -r squad-state-backup/* .squad/ 2>/dev/null || true
          mkdir -p data/metrics
          cp -r reskill-metrics-backup/* data/metrics/ 2>/dev/null || true
          rm -rf squad-state-backup reskill-metrics-backup
          git add .squad/ data/metrics/
          git diff --cached --quiet && exit 0
          git commit -m "chore: reskill state update [run #${GITHUB_RUN_ID}]"
          git push origin "$DATA_BRANCH"
