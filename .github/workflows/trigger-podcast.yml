name: Trigger podcast generation

on:
  workflow_dispatch:
    inputs:
      week:
        description: 'Week slug, e.g. 2026-W25'
        required: true
        type: string
      publish_run_id:
        description: 'Optional: crawl-and-publish workflow run ID that produced the manifest. If omitted, uses the most recent.'
        required: false
        type: string
      breaking_news:
        description: 'Optional last-moment news or important information to include in this podcast episode.'
        required: false
        type: string

permissions:
  contents: read

jobs:
  trigger-podcast:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Derive paths from week slug
        id: derive
        env:
          WEEK: ${{ inputs.week }}
        run: |
          set -euo pipefail
          if [[ ! "$WEEK" =~ ^[0-9]{4}-W[0-9]{2}$ ]]; then
            echo "::error::week must match YYYY-WNN (two-digit week), e.g. 2026-W25 (got: $WEEK)"
            exit 1
          fi

          # 2026-W25 → year=2026, short=W25
          YEAR="${WEEK%%-*}"
          SHORT="${WEEK##*-}"
          echo "article_path=content/weekly/${YEAR}/${SHORT}.md" >> "$GITHUB_OUTPUT"
          echo "article_url=https://claracle.com/weekly/${YEAR}/${SHORT}/" >> "$GITHUB_OUTPUT"

      - name: Locate publish manifest from crawl-and-publish
        id: manifest-locate
        env:
          WEEK: ${{ inputs.week }}
          PUBLISH_RUN_ID_INPUT: ${{ inputs.publish_run_id }}
        run: |
          set -euo pipefail
          if ! git fetch origin publish 2>/dev/null; then
            echo "::error::Could not fetch publish branch. Has crawl-and-publish run yet?"
            exit 1
          fi
          git checkout origin/publish -- data/candidates/ 2>/dev/null || true
          
          if [ -n "$PUBLISH_RUN_ID_INPUT" ]; then
            # Use specified run ID
            if ! [[ "$PUBLISH_RUN_ID_INPUT" =~ ^[0-9]+$ ]]; then
              echo "::error::publish_run_id must be a numeric workflow run ID (got: $PUBLISH_RUN_ID_INPUT)"
              exit 1
            fi
            MANIFEST="data/candidates/${WEEK}/${PUBLISH_RUN_ID_INPUT}/publish-manifest.json"
            if [ ! -f "$MANIFEST" ]; then
              echo "::error::Manifest not found at $MANIFEST for specified run $PUBLISH_RUN_ID_INPUT"
              exit 1
            fi
            echo "manifest_path=$MANIFEST" >> "$GITHUB_OUTPUT"
            echo "publish_run_id=$PUBLISH_RUN_ID_INPUT" >> "$GITHUB_OUTPUT"
            echo "::notice::Using manifest from specified run: $PUBLISH_RUN_ID_INPUT"
          else
            # Find the most recent manifest for this week
            MANIFEST=$(find "data/candidates/${WEEK}" -name 'publish-manifest.json' -type f 2>/dev/null | sort -V | tail -1)
            if [ -z "$MANIFEST" ]; then
              echo "::error::No manifest found for week $WEEK in data/candidates/. Has crawl-and-publish completed for this week?"
              exit 1
            fi
            # Extract run ID from path: data/candidates/WEEK/RUN_ID/publish-manifest.json
            RUN_ID="$(basename "$(dirname "$MANIFEST")")"
            echo "manifest_path=$MANIFEST" >> "$GITHUB_OUTPUT"
            echo "publish_run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
            echo "::notice::Using manifest from most recent run: $RUN_ID"
          fi

      - name: Trigger podcast generation with existing manifest
        env:
          PODCASTER_ENDPOINT: ${{ vars.PODCASTER_ENDPOINT }}
          PODCASTER_API_KEY: ${{ secrets.PODCASTER_API_KEY }}
          WEEK: ${{ inputs.week }}
          ARTICLE_URL: ${{ steps.derive.outputs.article_url }}
          ARTICLE_PATH: ${{ steps.derive.outputs.article_path }}
          MANIFEST_FILE: ${{ steps.manifest-locate.outputs.manifest_path }}
          PUBLISH_RUN_ID: ${{ steps.manifest-locate.outputs.publish_run_id }}
          TRIGGER_RUN_ID: ${{ github.run_id }}
          BREAKING_NEWS: ${{ inputs.breaking_news || '' }}
        run: |
          set -euo pipefail
          if [ -z "$PODCASTER_ENDPOINT" ] || [ -z "$PODCASTER_API_KEY" ]; then
            echo "::error::Requires PODCASTER_ENDPOINT variable and PODCASTER_API_KEY secret."
            exit 1
          fi
          if [ ! -f "$ARTICLE_PATH" ]; then
            # Article may already be published on the publish branch but not yet
            # merged into main via the sync PR. Fall back to the publish branch.
            git checkout origin/publish -- "$ARTICLE_PATH" 2>/dev/null || {
              echo "::error::Article '$ARTICLE_PATH' does not exist on main or the publish branch."
              exit 1
            }
          fi
          if [ ! -f "$MANIFEST_FILE" ]; then
            echo "::error::Manifest file not found: $MANIFEST_FILE"
            exit 1
          fi
          echo "::notice::Using manifest from crawl-and-publish run $PUBLISH_RUN_ID ($(date -r "$MANIFEST_FILE" '+%Y-%m-%d %H:%M:%S' 2>/dev/null || echo 'date unknown'))"

          BREAKING_ARGS=()
          if [ -n "$BREAKING_NEWS" ]; then
            BREAKING_ARGS=(--breaking-news "$BREAKING_NEWS")
          fi

          # Trigger real podcast generation using the existing validated manifest
          python3 scripts/podcaster_handoff.py \
            --week "$WEEK" \
            --article-url "$ARTICLE_URL" \
            --article-path "$ARTICLE_PATH" \
            --publish-run-id "$PUBLISH_RUN_ID" \
            --publish-mode normal \
            --manifest "$MANIFEST_FILE" \
            --podcast-config config/podcast.json \
            "${BREAKING_ARGS[@]}"
