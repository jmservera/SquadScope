name: Sync publish data to main

on: # zizmor: ignore[dangerous-triggers] intentional chaining off crawl-and-publish; sync job guarded by workflow_run.conclusion==success
  workflow_run:
    workflows: ["Crawl and publish weekly data"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Prevent overlapping force-pushes to sync/publish-to-main
concurrency:
  group: sync-publish-to-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # force-push the sync/publish-to-main branch
      pull-requests: write # open/update the sync PR into main
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Check out main # zizmor: ignore[artipacked] sync job force-pushes the sync branch; checkout token is reused by git push
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
          fetch-depth: 0

      - name: Sync data from publish
        id: sync
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SYNC_BRANCH: sync/publish-to-main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch publish
          git fetch origin publish

          # Create or reset sync branch from main
          git checkout -B "$SYNC_BRANCH" origin/main

          # Wipe target generated dirs so deletions on publish propagate to main
          rm -rf data/raw data/analyzed data/metrics content/weekly content/monthly content/yearly

          # REQUIRED — these must exist on publish; fail loudly if not
          git checkout origin/publish -- \
            data/raw/ \
            data/analyzed/ \
            data/metrics/ \
            content/weekly/ \
            content/monthly/ \
            content/yearly/

          # Rebuild rollups from the synced analyzed summaries so monthly/yearly
          # pages cannot drift from the weekly content in the generated sync PR.
          python3 scripts/generate_rollups.py

          # Stage restored/generated files before evaluating the cached diff.
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync."
            exit 0
          fi

          if git diff --cached --name-only | grep -E '^\.squad/' >/dev/null; then
            echo "::error::Refusing to sync .squad state from publish to main."
            git diff --cached --name-only | grep -E '^\.squad/' || true
            exit 1
          fi

          if git diff --cached --quiet; then
            echo "No changes to sync after staging."
            exit 0
          fi

          git commit -m "sync: publish data → main

          Automated sync of crawl data, analysis, and content
          from the publish branch."

          git push -f origin "$SYNC_BRANCH"

          # Create or update PR
          PR_NUMBER=$(gh pr list --head "$SYNC_BRANCH" --base main --json number --jq '.[0].number // empty')
          if [ -n "$PR_NUMBER" ]; then
            echo "Updated existing PR #${PR_NUMBER}"
          else
            gh pr create \
              --base main \
              --head "$SYNC_BRANCH" \
              --title "sync: publish data → main" \
              --body "Automated sync of generated content and data subtrees from the publish branch to main.

          This PR keeps main up-to-date with generated data and content from the crawl/publish pipeline.

          **Synced paths (required — workflow fails if missing on publish):**
          - \`data/raw/\` — raw crawl data
          - \`data/analyzed/\` — weekly analysis summaries
          - \`data/metrics/\` — token usage metrics
          - \`content/weekly/\`, \`content/monthly/\`, \`content/yearly/\` — generated Hugo pages

          **Explicitly NOT synced:**
          - \`.squad/**\` — Squad memory, decisions, run counters, skills, logs, and agent histories are not authoritative on publish.

          **Notes:**
          - Publish is authoritative for synced paths. Hand-edits on main to these paths WILL be overwritten.
          - Deletions on publish propagate to main (target dirs are wiped before checkout).

          Safe to merge — contains only generated data, no code changes." \
              --label "squad"
            PR_NUMBER=$(gh pr list --head "$SYNC_BRANCH" --base main --json number --jq '.[0].number')
          fi

          if [ -z "$PR_NUMBER" ]; then
            echo "::error::Could not determine PR number for sync branch $SYNC_BRANCH"
            exit 1
          fi

          # Short-circuit if the PR has already been merged (e.g. by a prior run).
          if [ "$(gh pr view "$PR_NUMBER" --json state --jq '.state')" = "MERGED" ]; then
            echo "::notice::PR #${PR_NUMBER} is already merged; nothing to do."
            exit 0
          fi

          HEAD_SHA=$(git rev-parse HEAD)
          CHECK_COUNT=0
          for _ in $(seq 1 30); do
            # `gh pr checks` exits non-zero ("no checks reported") until checks
            # register; tolerate that under `set -e` so we keep polling instead of
            # killing the whole sync job (the bug that left the sync PR unmerged).
            CHECK_COUNT=$(gh pr checks "$PR_NUMBER" --json name --jq 'length' || echo 0)
            if [ "$CHECK_COUNT" -gt 0 ]; then
              break
            fi
            echo "Waiting for PR #${PR_NUMBER} checks to register..."
            sleep 10
          done

          if [ "$CHECK_COUNT" -eq 0 ]; then
            echo "::error::No status checks registered for PR #${PR_NUMBER}; refusing to merge without validation."
            exit 1
          fi

          # Only now that we have confirmed required checks are configured do we
          # enable auto-merge, so the PR cannot merge immediately by bypassing the
          # "refusing to merge without validation" guard above. Emit a warning (not
          # a silent `|| true`) if auto-merge cannot be enabled.
          gh pr merge "$PR_NUMBER" --auto --squash || echo "::warning::Could not enable auto-merge for PR #${PR_NUMBER} — will attempt explicit merge after checks pass."

          gh pr checks "$PR_NUMBER" --watch --fail-fast
          # Auto-merge may have already squashed the PR once checks passed; if the
          # explicit merge fails, confirm the PR did in fact merge before succeeding.
          gh pr merge "$PR_NUMBER" --squash --match-head-commit "$HEAD_SHA" || \
            gh pr view "$PR_NUMBER" --json state --jq '.state' | grep -qx MERGED

          # Signal that the weekly content is now merged to main so the Podcaster
          # handoff (next step) can fire — and only now, never before the merge.
          echo "merged=true" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: ${{ steps.sync.outputs.merged == 'true' }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Trigger Podcaster after merge
        if: ${{ steps.sync.outputs.merged == 'true' }}
        env:
          PODCASTER_ENDPOINT: ${{ vars.PODCASTER_ENDPOINT }}
          PODCASTER_API_KEY: ${{ secrets.PODCASTER_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$PODCASTER_ENDPOINT" ] || [ -z "$PODCASTER_API_KEY" ]; then
            echo "::notice::Podcaster handoff skipped — PODCASTER_ENDPOINT/PODCASTER_API_KEY not configured."
            exit 0
          fi

          # main now contains the merged weekly content. Identify the latest week.
          git fetch origin main
          git checkout -B main origin/main
          LATEST=$(git ls-files 'content/weekly/*/W*.md' | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            echo "::notice::No weekly article on main; skipping Podcaster handoff."
            exit 0
          fi
          YEAR=$(basename "$(dirname "$LATEST")")
          SHORT=$(basename "$LATEST" .md)
          WEEK="${YEAR}-${SHORT}"
          # Derive the canonical URL via the shared helper to avoid slug drift.
          ARTICLE_URL=$(python3 - "$LATEST" <<'PY'
          import sys
          from scripts.podcaster_handoff import article_url_from_page_path

          print(article_url_from_page_path("https://claracle.com/", sys.argv[1]))
          PY
          )

          # Locate the publish manifest produced by crawl-and-publish for this week.
          # Surface publish access problems as warnings instead of swallowing them —
          # a broken publish branch should be visible in the Actions log, not silent.
          git fetch origin publish
          # Clear any stale candidates and fail closed: if the publish checkout
          # fails we skip the handoff rather than risk using an incorrect manifest.
          rm -rf data/candidates/
          if ! git checkout origin/publish -- data/candidates/; then
            echo "::warning::Could not check out data/candidates/ from publish; skipping Podcaster handoff."
            exit 0
          fi
          MANIFEST=$(find "data/candidates/${WEEK}" -name 'publish-manifest.json' -type f 2>/dev/null | sort -V | tail -1)
          if [ -z "$MANIFEST" ]; then
            echo "::warning::No manifest for ${WEEK}; skipping Podcaster handoff."
            exit 0
          fi
          if ! python3 scripts/publish_manifest.py assert-eligible --manifest "$MANIFEST"; then
            echo "::notice::Manifest not eligible; skipping Podcaster handoff."
            exit 0
          fi

          # --require-merged fails closed unless the merged article exists and its
          # sha256 matches the manifest, so the Podcaster is never triggered for a stub.
          python3 scripts/podcaster_handoff.py \
            --week "$WEEK" \
            --article-url "$ARTICLE_URL" \
            --article-path "$LATEST" \
            --publish-run-id "$(basename "$(dirname "$MANIFEST")")" \
            --publish-mode normal \
            --manifest "$MANIFEST" \
            --podcast-config config/podcast.json \
            --require-merged
