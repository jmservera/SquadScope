baseURL = 'https://claracle.com/'
locale = 'en-us'
title = 'SquadScope — Weekly Tech Trends from GitHub'
theme = 'PaperMod'
enableRobotsTXT = true
rssLimit = 20

[pagination]
  pagerSize = 10

[taxonomies]
  tag = 'tags'
  category = 'categories'
  topic = 'topics'

[outputs]
  home = ['HTML', 'RSS', 'JSON']
  section = ['HTML', 'RSS']
  taxonomy = ['HTML', 'RSS']
  term = ['HTML', 'RSS']

[params]
  ga_measurement_id = ""
  description = 'SquadScope turns GitHub activity into readable weekly, monthly, and yearly trend reports for busy developers and tech leads.'
  default_social_image = '/images/squadscope-social-card.png'
  defaultTheme = 'auto'
  disableSpecial1stPost = true
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowShareButtons = true
  ShareButtons = ['x', 'linkedin', 'facebook']
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  ShowAllPagesInArchive = true
  mainSections = ['weekly', 'monthly', 'yearly']

  [params.homeInfoParams]
    Title = 'Weekly tech signal from GitHub'
    Content = 'SquadScope turns GitHub activity into readable weekly, monthly, and yearly trend reports for busy developers and tech leads.'

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.35
    minMatchCharLength = 2
    limit = 10
    keys = ['title', 'permalink', 'summary', 'content', 'tags', 'categories', 'topics']

[menu]
  [[menu.main]]
    identifier = 'weekly'
    name = 'All weeks'
    url = '/weekly/'
    weight = 10

  [[menu.main]]
    identifier = 'topics'
    name = 'Topics'
    url = '/topics/'
    weight = 20

  [[menu.main]]
    identifier = 'monthly'
    name = 'Monthly'
    url = '/monthly/'
    weight = 30

  [[menu.main]]
    identifier = 'yearly'
    name = 'Yearly'
    url = '/yearly/'
    weight = 40

  [[menu.main]]
    identifier = 'search'
    name = 'Search'
    url = '/search/'
    weight = 50

  [[menu.main]]
    identifier = 'methodology'
    name = 'Methodology'
    url = '/methodology/'
    weight = 60

  [[menu.main]]
    identifier = 'about'
    name = 'About'
    url = '/about/'
    weight = 70

ignoreFiles = ['data/analyzed/.*\\.md$', 'data/metrics/.*\\.md$', 'data/metrics/.*\\.jsonl$']

[module]
  [[module.mounts]]
    source = 'data/cookieconsent.json'
    target = 'data/cookieconsent.json'
  [[module.mounts]]
    source = 'data/raw'
    target = 'data/raw'
  [[module.mounts]]
    source = 'data/snapshots'
    target = 'data/snapshots'
  [[module.mounts]]
    source = 'data/metrics'
    target = 'data/metrics'
    excludeFiles = ['*.md', '*.jsonl']
  [[module.mounts]]
    source = 'content'
    target = 'content'
  [[module.mounts]]
    source = 'static'
    target = 'static'
  [[module.mounts]]
    source = 'layouts'
    target = 'layouts'
  [[module.mounts]]
    source = 'assets'
    target = 'assets'
  [[module.mounts]]
    source = 'archetypes'
    target = 'archetypes'

[markup]
  [markup.goldmark.renderer]
    # unsafe = false: AI-generated content must not render raw HTML.
    # Use Hugo shortcodes or layouts for any intentional HTML embeds.
    unsafe = false

  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false
